<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь Событий</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans">

    <header class="bg-rose-600 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">📅</span>
                <h1 class="text-xl font-bold">Календарь событий</h1>
            </div>
            <a href="index.html" class="text-sm font-bold bg-rose-700 hover:bg-rose-800 px-4 py-2 rounded-xl transition-colors">На главную</a>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="md:col-span-1">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 sticky top-24">
                <h2 class="text-lg font-black text-rose-900 mb-4">Создать встречу</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Название</label>
                        <input type="text" id="event-title" placeholder="Встреча для проповеди" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-rose-500 font-medium">
                    </div>
                    
                    <div class="flex gap-2">
                        <div class="w-1/2">
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Дата</label>
                            <input type="date" id="event-date" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-rose-500 font-medium text-slate-700">
                        </div>
                        <div class="w-1/2">
                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Время</label>
                            <input type="time" id="event-time" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-rose-500 font-medium text-slate-700">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Группа (пусто = для всех)</label>
                        <input type="number" id="event-group" placeholder="Например: 5" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-rose-500 font-medium text-slate-700">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">Ведущие (через запятую для очереди)</label>
                        <input type="text" id="event-leaders" placeholder="Брат А, Брат Б" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-rose-500 font-medium text-slate-700">
                    </div>

                    <div class="bg-rose-50 p-3 rounded-xl border border-rose-100 mt-2">
                        <label class="flex items-center gap-2 cursor-pointer mb-2">
                            <input type="checkbox" id="event-recurring" class="w-4 h-4 accent-rose-600 rounded" onchange="document.getElementById('weeks-container').classList.toggle('hidden')">
                            <span class="text-sm font-bold text-rose-900">Повторять каждую неделю</span>
                        </label>
                        <div id="weeks-container" class="hidden flex items-center gap-2">
                            <span class="text-xs text-rose-700 font-medium">Создать на</span>
                            <input type="number" id="event-weeks" value="4" min="2" max="12" class="w-16 p-1 text-center rounded border border-rose-200 outline-none">
                            <span class="text-xs text-rose-700 font-medium">недель вперед</span>
                        </div>
                    </div>

                    <button id="save-event-btn" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold p-4 rounded-xl shadow-md transition-all active:scale-95 mt-4">
                        Опубликовать
                    </button>
                </div>
            </div>
        </div>

        <div class="md:col-span-2">
            <h2 class="text-xl font-bold mb-4">Все события собрания</h2>
            <div id="events-list" class="space-y-3">
                <p class="text-slate-500 italic">Загрузка...</p>
            </div>
        </div>
    </main>

    <script type="module" src="calendar.js"></script>
</body>
</html>
