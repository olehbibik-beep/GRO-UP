<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь Событий</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-rose-50 text-slate-800 min-h-screen font-sans">

    <header class="bg-rose-600 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">📅</span>
                <h1 class="text-xl font-bold">Календарь событий</h1>
            </div>
            <a href="index.html" class="text-sm font-bold bg-rose-700 hover:bg-rose-800 px-4 py-2 rounded-xl transition-colors">На главную</a>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="md:col-span-1">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-rose-100 sticky top-24">
                <h2 class="text-lg font-bold text-rose-900 mb-4">Создать событие</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Название события</label>
                        <input type="text" id="event-title" placeholder="Например: Встреча для проповеди" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-rose-500 font-medium">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Точная дата</label>
                        <input type="date" id="event-date" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-rose-500 font-medium text-slate-700">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Для какой группы? (Оставьте пустым для всех)</label>
                        <input type="number" id="event-group" placeholder="Например: 5" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-rose-500 font-medium text-slate-700">
                    </div>
                    <button id="save-event-btn" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold p-4 rounded-xl shadow-md transition-all active:scale-95 mt-2">
                        Опубликовать
                    </button>
                </div>
            </div>
        </div>

        <div class="md:col-span-2">
            <h2 class="text-xl font-bold mb-4">Все события собрания</h2>
            <div id="events-list" class="space-y-3">
                <p class="text-slate-500 italic">Загрузка...</p>
            </div>
        </div>
    </main>

    <script type="module" src="calendar.js"></script>
</body>
</html>
