<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь Событий</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen font-sans">

    <header class="bg-slate-900 text-white shadow-xl sticky top-0 z-50 border-b border-slate-800">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-rose-500 text-2xl">📅</span>
                <h1 class="text-lg font-black uppercase tracking-wider">Календарь событий</h1>
            </div>
            <a href="index.html" class="text-xs font-bold text-slate-300 hover:text-white bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-xl transition-colors border border-slate-700">На главную</a>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-6 md:py-8 grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8">
        
        <div class="md:col-span-1">
            <div class="bg-white p-5 md:p-6 rounded-2xl shadow-md border border-slate-200 sticky top-24">
                <h2 class="text-lg font-black text-slate-800 mb-5 flex items-center gap-2">
                    <span class="text-rose-500">➕</span> Создать встречу
                </h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Название</label>
                        <input type="text" id="event-title" placeholder="Встреча для проповеди" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition-all font-bold text-slate-700">
                    </div>
                    
                    <div class="flex gap-3">
                        <div class="w-full">
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Дата</label>
                            <input type="date" id="event-date" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition-all font-bold text-slate-700">
                        </div>
                        <div class="w-full">
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Время</label>
                            <input type="time" id="event-time" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition-all font-bold text-slate-700">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Группа (пусто = для всех)</label>
                        <input type="number" id="event-group" placeholder="Например: 5" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm outline-none focus:border-rose-400 focus:ring-2 focus:ring-rose-100 transition-all font-bold text-slate-700">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Ведущие (Очередность)</label>
                        <div id="users-checklist" class="max-h-36 overflow-y-auto bg-slate-50 border border-slate-200 rounded-xl p-2 space-y-1">
                            <p class="text-xs text-slate-400 italic p-2">Загрузка списка...</p>
                        </div>
                    </div>

                    <div class="bg-rose-50 p-4 rounded-xl border border-rose-100 mt-2">
                        <label class="flex items-center gap-2 cursor-pointer mb-2">
                            <input type="checkbox" id="event-recurring" class="w-4 h-4 accent-rose-600 rounded cursor-pointer" onchange="document.getElementById('weeks-container').classList.toggle('hidden')">
                            <span class="text-xs font-bold text-rose-900 uppercase tracking-wide mt-0.5">Повторять еженедельно</span>
                        </label>
                        <div id="weeks-container" class="hidden flex items-center justify-between gap-2 mt-3 bg-white p-2 rounded-lg border border-rose-200">
                            <span class="text-xs text-rose-700 font-bold">На сколько недель?</span>
                            <input type="number" id="event-weeks" value="4" min="2" max="12" class="w-16 p-1.5 text-center font-black text-rose-900 bg-rose-50 rounded-md border border-rose-200 outline-none">
                        </div>
                    </div>

                    <button id="save-event-btn" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 rounded-xl shadow-md transition-all active:scale-95 mt-4 text-sm uppercase tracking-widest">
                        Опубликовать
                    </button>
                </div>
            </div>
        </div>

        <div class="md:col-span-2">
            <div class="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-3">
                <h2 class="text-xl font-black text-slate-800 flex items-center gap-2">
                    График встреч
                </h2>
                <label class="flex items-center gap-2 cursor-pointer bg-white px-3 py-2 rounded-xl border border-slate-200 shadow-sm hover:bg-slate-50 transition-colors">
                    <input type="checkbox" id="show-all-events-cb" class="w-4 h-4 accent-slate-800 rounded cursor-pointer shrink-0">
                    <span class="text-xs font-bold text-slate-600 uppercase tracking-wide mt-0.5">Показать другие группы</span>
                </label>
            </div>
            
            <div id="events-list" class="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col overflow-hidden">
                <p class="text-slate-500 italic p-6 text-center text-sm">Загрузка...</p>
            </div>
        </div>
    </main>

    <script type="module" src="calendar.js?v=30"></script>
</body>
</html>
