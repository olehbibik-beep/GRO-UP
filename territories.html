<body class="bg-ui-bg text-slate-800 min-h-screen font-sans">

        <a href="index.html" title="На сайт" class="text-indigo-300 hover:text-white flex flex-col items-center justify-center flex-1 py-4 md:flex-none md:w-full md:mb-4 outline-none transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 md:w-7 md:h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" /></svg>

        <a href="admin.html" title="Пользователи" class="text-indigo-300 hover:text-white flex flex-col items-center justify-center flex-1 py-4 md:flex-none md:w-full md:mb-4 outline-none transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 md:w-7 md:h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M10.341 3.897a.75.75 0 011.318 0l.977 1.977a.75.75 0 00.91.405l2.12-.572a.75.75 0 01.895.895l-.572 2.12a.75.75 0 00.405.91l1.977.977a.75.75 0 010 1.318l-1.977.977a.75.75 0 00-.405.91l.572 2.12a.75.75 0 01-.895.895l-2.12-.572a.75.75 0 00-.91.405l-.977 1.977a.75.75 0 01-1.318 0l-.977-1.977a.75.75 0 00-.91-.405l-2.12.572a.75.75 0 01-.895-.895l.572-2.12a.75.75 0 00-.405-.91l-1.977-.977a.75.75 0 010-1.318l1.977-.977a.75.75 0 00.405-.91l-.572-2.12a.75.75 0 01.895-.895l2.12.572a.75.75 0 00.91-.405l.977-1.977zM12 15a3 3 0 100-6 3 3 0 000 6z" /></svg>

        <a href="school.html" title="Школа" class="text-indigo-300 hover:text-white flex flex-col items-center justify-center flex-1 py-4 md:flex-none md:w-full md:mb-4 outline-none transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 md:w-7 md:h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" /></svg>

            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 md:w-7 md:h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498l4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 00-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0z" /></svg>

        <a href="calendar.html" title="Календарь" class="text-indigo-300 hover:text-white flex flex-col items-center justify-center flex-1 py-4 md:flex-none md:w-full outline-none mt-auto transition-colors">

    <main class="w-full max-w-5xl mx-auto pt-4 md:pt-6 px-4 pb-24 md:pl-28 md:pr-6">
        
        <div class="mb-6 flex justify-between items-center bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-3">
                <span class="text-emerald-500 text-3xl drop-shadow-sm">🗺️</span>
                <div>
                    <h1 class="text-xl md:text-2xl font-black text-emerald-600">Участки</h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">Управление территориями</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8">
            
            <div class="md:col-span-1 space-y-6">
                
                <div class="bg-white p-5 md:p-6 rounded-2xl shadow-md border border-slate-200">
                    <h2 class="text-sm font-bold flex items-center gap-2 mb-4 uppercase tracking-widest text-slate-500">
                        <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                        Запросы (<span id="requests-count">0</span>)
                    </h2>
                    <div id="requests-list" class="space-y-2 max-h-48 overflow-y-auto pr-1 custom-scrollbar">
                        <p class="text-slate-400 italic text-xs text-center py-4 bg-slate-50 rounded-xl">Нет новых запросов</p>
                    </div>
                </div>

                <div class="bg-white p-5 md:p-6 rounded-2xl shadow-md border border-slate-200 sticky top-6">
                    <h2 class="text-lg font-black text-slate-800 mb-5 flex items-center gap-2">
                        <span class="text-emerald-500">➕</span> Выдать участок
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Кому выдать</label>
                            <select id="user-select" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm outline-none focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 transition-all font-bold text-slate-700 cursor-pointer">
                                <option value="" disabled selected>Загрузка...</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Номер участка</label>
                            <input type="number" id="territory-number" placeholder="Например: 105" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 transition-all font-black font-mono text-lg text-emerald-700 text-center">
                        </div>
                        <button id="assign-btn" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 rounded-xl shadow-md transition-all active:scale-95 mt-2 text-sm uppercase tracking-widest outline-none">
                            Назначить
                        </button>
                    </div>
                </div>

            </div>

            <div class="md:col-span-2">
                <div class="flex justify-between items-end mb-4">
                    <h2 class="text-xl font-black text-slate-800 flex items-center gap-2">В работе</h2>
                    <input type="text" id="search-terr" placeholder="Поиск по имени или №..." class="p-2 px-4 border border-slate-200 rounded-xl outline-none focus:border-emerald-500 w-64 text-sm font-medium bg-white shadow-sm">
                </div>
                
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[500px]">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-200 text-[9px] text-slate-400 uppercase tracking-widest">
                                    <th class="py-3 px-4 font-bold w-20 text-center">Номер</th>
                                    <th class="py-3 px-4 font-bold">Возвещатель</th>
                                    <th class="py-3 px-4 font-bold text-center">Взят</th>
                                    <th class="py-3 px-4 font-bold text-right w-24">Действие</th>
                                </tr>
                            </thead>
                            <tbody id="territories-list" class="divide-y divide-slate-100 text-sm font-medium">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script type="module" src="territories.js?v=50"></script>
</body>
</html>
