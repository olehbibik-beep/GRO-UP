
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление Участками</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-emerald-50 text-slate-800 min-h-screen font-sans">

    <header class="bg-emerald-600 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🗺️</span>
                <div>
                    <h1 class="text-xl font-bold">Участки</h1>
                    <p class="text-xs text-emerald-200">Распределение территорий</p>
                </div>
            </div>
            <a href="admin.html" class="text-sm font-bold bg-emerald-700 hover:bg-emerald-800 px-4 py-2 rounded-xl transition-colors">Вернуться в Админку</a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-1 space-y-6">
            
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-emerald-100">
                <h2 class="text-lg font-bold text-amber-600 mb-4 flex items-center gap-2">
                    <span>🔔</span> Запросы (<span id="requests-count">0</span>)
                </h2>
                <div id="requests-list" class="space-y-3 max-h-60 overflow-y-auto pr-2">
                    <p class="text-slate-400 italic text-sm">Нет новых запросов.</p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-emerald-100 sticky top-24">
                <h2 class="text-lg font-bold text-emerald-900 mb-4">Выдать участок</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Кому выдать</label>
                        <select id="user-select" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-emerald-500 font-medium">
                            <option value="">Загрузка пользователей...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Номер участка</label>
                        <input type="number" id="territory-number" placeholder="Например: 105" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-emerald-500 font-medium font-mono text-lg">
                    </div>
                    <button id="assign-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold p-4 rounded-xl shadow-md transition-all active:scale-95">
                        Назначить
                    </button>
                </div>
            </div>

        </div>

        <div class="md:col-span-2">
            <h2 class="text-xl font-bold mb-4 text-slate-800">Обрабатываемые участки</h2>
            
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-sm text-slate-500 uppercase">
                            <th class="p-4 font-bold w-24 text-center">Номер</th>
                            <th class="p-4 font-bold">Возвещатель</th>
                            <th class="p-4 font-bold">Дата выдачи</th>
                            <th class="p-4 font-bold text-right">Действия</th>
                        </tr>
                    </thead>
                    <tbody id="territories-list" class="divide-y divide-slate-100 text-sm">
                        </tbody>
                </table>
            </div>
        </div>

    </main>

    <script type="module" src="territories.js"></script>
</body>
</html>
