<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-lang="terr_title">Управление Участками - GRO-UP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 
                        ui: { 
                            bg: '#f8fafc', 
                            adminNav: '#A82A56' 
                        } 
                    } 
                } 
            } 
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    </style>
</head>
<body class="bg-ui-bg text-slate-800 min-h-screen font-sans">

   <nav class="fixed bottom-0 left-0 w-full bg-ui-adminNav flex flex-row items-center justify-center z-50 md:top-0 md:h-screen md:w-20 md:flex-col md:justify-start md:py-6 pb-safe border-t border-indigo-900 md:border-t-0">
        <a href="index.html" data-lang-title="back_home" class="nav-btn group flex flex-col items-center justify-center flex-1 py-3 md:flex-none md:w-full outline-none transition-colors">
            <div class="nav-icon-container text-indigo-300 hover:text-white p-2.5 rounded-full transition-colors flex flex-col items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 md:w-7 md:h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                <span class="text-[8px] font-black uppercase tracking-widest hidden md:block" data-lang="btn_back">Назад</span>
            </div>
        </a>
    </nav>

    <main class="w-full max-w-5xl mx-auto pt-4 md:pt-6 px-4 pb-24 md:pl-28 md:pr-6">
        
        <div class="mb-6 flex justify-between items-center bg-white p-4 md:p-5 rounded-xl border border-slate-200">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-emerald-50 flex items-center justify-center shrink-0 border border-emerald-100">
                    <svg class="w-5 h-5 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" /></svg>
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-black text-emerald-600" data-lang="terr_h1">Участки</h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5" data-lang="manage_terr">Управление территориями</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8">
            
            <div class="md:col-span-1 space-y-6">
                
                <div class="bg-white p-5 md:p-6 rounded-xl border border-slate-200">
                    <h2 class="text-sm font-bold flex items-center gap-2 mb-4 uppercase tracking-widest text-slate-500">
                        <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                        <span data-lang="requests_title">Запросы</span> (<span id="requests-count">0</span>)
                    </h2>
                    <div id="requests-list" class="space-y-2 max-h-48 overflow-y-auto pr-1 custom-scrollbar">
                        <p class="text-slate-400 italic text-xs text-center py-4 bg-slate-50 rounded-xl" data-lang="no_new_requests_terr">Нет новых запросов</p>
                    </div>
                </div>

                <div class="bg-white p-5 md:p-6 rounded-xl border border-slate-200 sticky top-6">
                    <h2 class="text-lg font-black text-slate-800 mb-5 flex items-center gap-2">
                        <svg class="w-5 h-5 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>
                        <span data-lang="issue_terr">Выдать участок</span>
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5" data-lang="to_whom">Кому выдать</label>
                            <select id="user-select" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm outline-none focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 transition-all font-bold text-slate-700 cursor-pointer">
                                <option value="" disabled selected data-lang="loading">Загрузка...</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5" data-lang="terr_number_label">Номер участка</label>
                            <input type="number" id="territory-number" data-lang-placeholder="ph_terr_num" placeholder="Например: 105" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-emerald-400 focus:ring-2 focus:ring-emerald-100 transition-all font-black font-mono text-lg text-emerald-700 text-center">
                        </div>
                        <button id="assign-btn" data-lang="btn_assign" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 rounded-xl transition-all active:scale-95 mt-2 text-sm uppercase tracking-widest outline-none">
                            Назначить
                        </button>
                    </div>
                </div>

            </div>

            <div class="md:col-span-2">
                <div class="flex justify-between items-end mb-4">
                    <h2 class="text-xl font-black text-slate-800 flex items-center gap-2" data-lang="in_progress">В работе</h2>
                    <input type="text" id="search-terr" data-lang-placeholder="ph_search_terr" placeholder="Поиск по имени или №..." class="p-2 px-4 border border-slate-200 rounded-xl outline-none focus:border-emerald-500 w-64 text-sm font-medium bg-white">
                </div>
                
                <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[500px]">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-200 text-[9px] text-slate-400 uppercase tracking-widest">
                                    <th class="py-3 px-4 font-bold w-20 text-center" data-lang="th_number">Номер</th>
                                    <th class="py-3 px-4 font-bold" data-lang="th_publisher">Возвещатель</th>
                                    <th class="py-3 px-4 font-bold text-center" data-lang="th_taken">Взят</th>
                                    <th class="py-3 px-4 font-bold text-right w-24" data-lang="th_action">Действие</th>
                                </tr>
                            </thead>
                            <tbody id="territories-list" class="divide-y divide-slate-100 text-sm font-medium">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script type="module" src="territories.js?v=52"></script>
</body>
</html>
