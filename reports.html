<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-lang="reports_title">Отчеты - GRO-UP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 
                        ui: { 
                            bg: '#f8fafc', 
                            adminNav: '#1D7373' 
                        } 
                    } 
                } 
            } 
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        
        @media print {
            nav, .no-print { display: none !important; }
            main { padding: 0 !important; margin: 0 !important; }
            body { background: white !important; }
            .border { border-color: #e2e8f0 !important; }
        }
    </style>
</head>
<body class="bg-ui-bg text-slate-800 min-h-screen font-sans">

    <nav class="fixed bottom-0 left-0 w-full bg-ui-adminNav flex flex-row items-center justify-center z-50 md:top-0 md:h-screen md:w-20 md:flex-col md:justify-start md:py-6 pb-safe border-t border-indigo-900 md:border-t-0 no-print">
        <a href="index.html" data-lang-title="back_home" class="nav-btn group flex flex-col items-center justify-center flex-1 py-3 md:flex-none md:w-full outline-none transition-colors">
            <div class="nav-icon-container text-indigo-300 hover:text-white p-2.5 rounded-full transition-colors flex flex-col items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 md:w-7 md:h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                <span class="text-[8px] font-black uppercase tracking-widest hidden md:block" data-lang="btn_back">Назад</span>
            </div>
        </a>
    </nav>

    <main class="w-full max-w-5xl mx-auto pt-4 md:pt-6 px-4 pb-24 md:pl-28 md:pr-6">
        
        <div class="mb-6 flex justify-between items-center bg-white p-4 md:p-5 rounded-xl border border-slate-200 no-print">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-purple-50 flex items-center justify-center shrink-0 border border-purple-100">
                    <svg class="w-5 h-5 text-purple-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-black text-purple-600" data-lang="reports_summary">Сводка отчетов</h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5" id="group-title" data-lang="loading_access">Загрузка доступа...</p>
                </div>
            </div>
            <div class="hidden md:flex gap-2 text-xs font-bold no-print">
                <a href="admin.html" class="text-slate-500 hover:text-slate-800 bg-slate-50 hover:bg-slate-100 px-3 py-2 rounded-lg border border-slate-200 transition-colors" data-lang="users_link">Пользователи</a>
            </div>
        </div>

        <div class="bg-white p-5 md:p-6 rounded-xl border border-slate-200 mb-6 flex flex-col md:flex-row gap-4 md:items-center justify-between no-print">
            <div class="flex gap-6 items-center">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1" data-lang="submitted_reports">Сдали отчеты</p>
                    <p class="text-2xl font-black text-slate-800" id="total-pubs">0</p>
                </div>
                <div class="w-px h-10 bg-slate-200"></div>
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1" data-lang="total_hours">Итого часов</p>
                    <p class="text-3xl font-black text-purple-600" id="total-hours">0</p>
                </div>
            </div>
            
            <div class="flex gap-3 items-center w-full md:w-auto">
                <select id="month-filter" class="flex-grow md:flex-grow-0 bg-slate-50 border border-slate-200 rounded-lg p-2.5 outline-none focus:border-purple-500 font-bold text-slate-700 text-sm cursor-pointer">
                    <option value="all" data-lang="all_months">Все месяцы</option>
                </select>
                <button onclick="window.print()" data-lang-title="print_btn" title="Распечатать" class="bg-slate-800 hover:bg-slate-900 text-white p-2.5 rounded-lg font-bold transition-colors outline-none flex items-center justify-center">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
                </button>
            </div>
        </div>

        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[750px]">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-[10px] text-slate-400 uppercase tracking-widest">
                            <th class="py-3 px-4 font-bold" data-lang="th_publisher">Возвещатель</th>
                            <th class="py-3 px-4 font-bold text-center w-20" data-lang="th_group">Группа</th>
                            <th class="py-3 px-4 font-bold text-center w-20 text-emerald-600" data-lang="th_participated">Служил</th>
                            <th class="py-3 px-4 font-bold text-center w-20 text-purple-600" data-lang="th_hours">Часы</th>
                            <th class="py-3 px-4 font-bold text-center w-24" data-lang="th_studies">Изучения</th>
                            <th class="py-3 px-4 font-bold text-center w-20" data-lang="th_credit">Кредит</th>
                            <th class="py-3 px-4 font-bold text-center w-32" data-lang="th_month">Месяц</th>
                            <th class="py-3 px-4 font-bold text-right w-16 no-print" id="th-action-col"></th>
                        </tr>
                    </thead>
                    <tbody id="reports-list" class="divide-y divide-slate-100 text-sm font-medium">
                        <tr><td colspan="8" class="p-6 text-center text-slate-400 italic" data-lang="loading_data">Загрузка данных...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script type="module" src="reports.js?v=99"></script>
</body>
</html>
