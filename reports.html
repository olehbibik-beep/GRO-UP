<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отчеты - GRO-UP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-purple-50 text-slate-800 min-h-screen font-sans">

    <header class="bg-purple-700 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">📊</span>
                <div>
                    <h1 class="text-xl font-bold">Сводка отчетов</h1>
                    <p class="text-xs text-purple-200" id="group-title">Загрузка доступа...</p>
                </div>
            </div>
            <a href="index.html" class="text-sm font-bold bg-purple-800 hover:bg-purple-900 px-4 py-2 rounded-xl transition-colors">На главную</a>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8">
        
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-purple-100 mb-6 flex flex-wrap gap-6 items-center justify-between">
            <div>
                <p class="text-xs font-bold text-slate-400 uppercase">Итого Часов</p>
                <p class="text-3xl font-black text-purple-700" id="total-hours">0</p>
            </div>
            
            <div class="flex gap-4 items-center">
                <select id="month-filter" class="bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-purple-500 font-bold text-slate-700">
                    <option value="all">Все месяцы</option>
                    </select>
                <button onclick="window.print()" class="bg-purple-100 text-purple-700 hover:bg-purple-200 px-4 py-3 rounded-xl font-bold transition-colors">🖨️ Печать</button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50 border-b border-slate-200 text-sm text-slate-500 uppercase">
                        <th class="p-4 font-bold">Возвещатель</th>
                        <th class="p-4 font-bold text-center">Группа</th>
                        <th class="p-4 font-bold text-center text-emerald-600">Служил</th>
                        
                        <th class="p-4 font-bold text-center">Часы</th>
                        <th class="p-4 font-bold text-center">Кр</th>
                        <th class="p-4 font-bold text-center">BS</th>
                        <th class="p-4 font-bold text-right">Месяц</th>
                    </tr>
                </thead>
                <tbody id="reports-list" class="divide-y divide-slate-100 text-sm">
                    <tr><td colspan="6" class="p-4 text-center text-slate-400 italic">Загрузка данных...</td></tr>
                </tbody>
            </table>
        </div>

    </main>

    <script type="module" src="reports.js"></script>
</body>
</html>
