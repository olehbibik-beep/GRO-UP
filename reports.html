<html lang="ru">

    <script>
        tailwind.config = {

                            adminNav: '#1D7373' // Глубокий Индиго
                        } 
                    } 
                } 
            } 
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        
        /* Скрываем лишнее при печати */
        @media print {
            nav, .no-print { display: none !important; }
            main { padding: 0 !important; margin: 0 !important; }
            body { background: white !important; }
            .shadow-sm, .shadow-md { box-shadow: none !important; }
            .border { border-color: #e2e8f0 !important; }
        }
    </style>
</head>
<body class="bg-ui-bg text-slate-800 min-h-screen font-sans">

   <nav class="fixed bottom-0 left-0 w-full bg-ui-adminNav flex flex-row items-center justify-between z-50 md:top-0 md:h-screen md:w-20 md:flex-col md:justify-start md:py-6 pb-safe border-t border-indigo-900 md:border-t-0">
        <a href="index.html" title="На сайт" class="flex flex-col items-center justify-center flex-1 py-4 md:flex-none md:w-full md:mb-4 outline-none transition-colors text-indigo-300 hover:text-white"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 md:w-7 md:h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" /></svg></a>
        <a href="admin.html" title="Пользователи" class="hidden flex-col items-center justify-center flex-1 py-4 md:flex-none md:w-full md:mb-4 outline-none transition-colors text-indigo-300 hover:text-white"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 md:w-7 md:h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M10.341 3.897a.75.75 0 011.318 0l.977 1.977a.75.75 0 00.91.405l2.12-.572a.75.75 0 01.895.895l-.572 2.12a.75.75 0 00.405.91l1.977.977a.75.75 0 010 1.318l-1.977.977a.75.75 0 00-.405.91l.572 2.12a.75.75 0 01-.895.895l-2.12-.572a.75.75 0 00-.91.405l-.977 1.977a.75.75 0 01-1.318 0l-.977-1.977a.75.75 0 00-.91-.405l-2.12.572a.75.75 0 01-.895-.895l.572-2.12a.75.75 0 00-.405-.91l-1.977-.977a.75.75 0 010-1.318l1.977-.977a.75.75 0 00.405-.91l-.572-2.12a.75.75 0 01.895-.895l2.12.572a.75.75 0 00.91-.405l.977-1.977zM12 15a3 3 0 100-6 3 3 0 000 6z" /></svg></a>
        <a href="school.html" title="Школа" class="hidden flex-col items-center justify-center flex-1 py-4 md:flex-none md:w-full md:mb-4 outline-none transition-colors text-indigo-300 hover:text-white"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 md:w-7 md:h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" /></svg></a>
        <a href="territories.html" title="Участки" class="hidden flex-col items-center justify-center flex-1 py-4 md:flex-none md:w-full md:mb-4 outline-none transition-colors text-indigo-300 hover:text-white"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 md:w-7 md:h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498l4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 00-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0z" /></svg></a>
        <a href="calendar.html" title="Календарь" class="hidden flex-col items-center justify-center flex-1 py-4 md:flex-none md:w-full outline-none mt-auto transition-colors text-indigo-300 hover:text-white"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 md:w-7 md:h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" /></svg></a>
    </nav>

    <main class="w-full max-w-5xl mx-auto pt-4 md:pt-6 px-4 pb-24 md:pl-28 md:pr-6">
        
        <div class="mb-6 flex justify-between items-center bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-3">
                <span class="text-purple-500 text-3xl drop-shadow-sm">📊</span>
                <div>
                    <h1 class="text-xl md:text-2xl font-black text-purple-600">Сводка отчетов</h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5" id="group-title">Загрузка доступа...</p>
                </div>
            </div>
            <div class="hidden md:flex gap-2 text-xs font-bold no-print">
                <a href="admin.html" class="text-slate-500 hover:text-slate-800 bg-slate-50 hover:bg-slate-100 px-3 py-2 rounded-lg border border-slate-200 transition-colors">Пользователи</a>
            </div>
        </div>

        <div class="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200 mb-6 flex flex-col md:flex-row gap-4 md:items-center justify-between no-print">
            
            <div class="flex gap-6 items-center">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Сдали отчеты</p>
                    <p class="text-2xl font-black text-slate-800" id="total-pubs">0</p>
                </div>
                <div class="w-px h-10 bg-slate-200"></div>
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Итого часов</p>
                    <p class="text-3xl font-black text-purple-600" id="total-hours">0</p>
                </div>
            </div>
            
            <div class="flex gap-3 items-center w-full md:w-auto">
                <select id="month-filter" class="flex-grow md:flex-grow-0 bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-purple-500 font-bold text-slate-700 text-sm cursor-pointer shadow-sm">
                    <option value="all">Все месяцы</option>
                </select>
                <button onclick="window.print()" title="Распечатать" class="bg-slate-800 hover:bg-slate-900 text-white p-3 rounded-xl font-bold transition-colors shadow-md outline-none">🖨️</button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[700px]">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-[10px] text-slate-400 uppercase tracking-widest">
                            <th class="py-3 px-4 font-bold">Возвещатель</th>
                            <th class="py-3 px-4 font-bold text-center w-20">Группа</th>
                            <th class="py-3 px-4 font-bold text-center w-20 text-emerald-600">Служил</th>
                            <th class="py-3 px-4 font-bold text-center w-20 text-purple-600">Часы</th>
                            <th class="py-3 px-4 font-bold text-center w-20">Кр</th>
                            <th class="py-3 px-4 font-bold text-center w-20">BS</th>
                            <th class="py-3 px-4 font-bold text-right w-32">Месяц</th>
                        </tr>
                    </thead>
                    <tbody id="reports-list" class="divide-y divide-slate-100 text-sm font-medium">
                        <tr><td colspan="7" class="p-6 text-center text-slate-400 italic">Загрузка данных...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script type="module" src="reports.js?v=90"></script>
</body>
</html>
