<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление Школой</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ui: {
                            bg: '#f8fafc',       
                            nav: '#0f172a',      
                            active: '#6366f1',   
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    </style>
</head>
<body class="bg-ui-bg text-slate-800 min-h-screen font-sans">

    <header class="bg-slate-900 text-white shadow-xl sticky top-0 z-50 border-b border-slate-800">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-sky-500 text-2xl">📚</span>
                <h1 class="text-lg font-black uppercase tracking-wider">Школа</h1>
            </div>
            <a href="index.html" class="text-xs font-bold text-slate-300 hover:text-white bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-xl transition-colors border border-slate-700">На главную</a>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-6 md:py-8 grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8">
        
        <div class="md:col-span-1">
            <div class="bg-white p-5 md:p-6 rounded-2xl shadow-md border border-slate-200 sticky top-24">
                <h2 class="text-lg font-black text-slate-800 mb-5 flex items-center gap-2">
                    <span class="text-sky-500">➕</span> Назначить задание
                </h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Ученик (из списка)</label>
                        <select id="student-select" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100 transition-all font-bold text-slate-700 cursor-pointer">
                            <option value="" disabled selected>Загрузка учеников...</option>
                        </select>
                        <p class="text-[9px] text-slate-400 mt-1 ml-1">Отображаются только участники школы</p>
                    </div>
                    
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Задание (Тема / Номер)</label>
                        <input type="text" id="task-title" placeholder="Например: Чтение Библии" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100 transition-all font-bold text-slate-700">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Дата выступления</label>
                        <input type="date" id="task-date" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100 transition-all font-bold text-slate-700 cursor-pointer">
                    </div>

                    <button id="assign-btn" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 rounded-xl shadow-md transition-all active:scale-95 mt-4 text-sm uppercase tracking-widest">
                        Назначить
                    </button>
                </div>
            </div>
        </div>

        <div class="md:col-span-2">
            <h2 class="text-xl font-black text-slate-800 mb-4">График выступлений</h2>
            
            <div id="tasks-list" class="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col overflow-hidden">
                <p class="text-slate-500 italic p-6 text-center text-sm">Загрузка...</p>
            </div>
        </div>

    </main>

    <script type="module" src="school.js?v=1"></script>
</body>
</html>
