<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление Школой</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { ui: { bg: '#f8fafc' } } } } }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    </style>
</head>
<body class="bg-ui-bg text-slate-800 min-h-screen font-sans">

    <header class="bg-slate-900 text-white shadow-xl sticky top-0 z-50 border-b border-slate-800">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-sky-500 text-2xl">📚</span>
                <h1 class="text-lg font-black uppercase tracking-wider">Школа</h1>
            </div>
            <a href="admin.html" class="text-xs font-bold text-slate-300 hover:text-white bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-xl transition-colors border border-slate-700">Настройки админа</a>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-6 md:py-8 grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8">
        
        <div class="md:col-span-1">
            <div class="bg-white p-5 md:p-6 rounded-2xl shadow-md border border-slate-200 sticky top-24">
                <h2 class="text-lg font-black text-slate-800 mb-5 flex items-center gap-2">
                    <span class="text-sky-500">➕</span> Назначить задание
                </h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Ученик</label>
                        <select id="student-select" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100 transition-all font-bold text-slate-700 cursor-pointer">
                            <option value="" disabled selected>Загрузка учеников...</option>
                        </select>
                        <div id="student-history-hint" class="mt-2 text-[10px] font-bold px-2 hidden"></div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Помощник (Напарник)</label>
                        <select id="assistant-select" disabled class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm outline-none focus:border-sky-400 focus:ring-2 focus:ring-sky-100 transition-all font-bold text-slate-700 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed">
                            <option value="" selected>Сначала выберите ученика</option>
                        </select>
                    </div>
                    
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 space-y-3">
                        <div class="flex gap-3">
                            <div class="w-1/3">
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">№ Зад.</label>
                                <select id="task-number" class="w-full bg-white border border-slate-200 rounded-lg p-2.5 text-sm outline-none focus:border-sky-400 font-bold text-slate-700 cursor-pointer">
                                    <option value="" disabled selected>-</option>
                                </select>
                            </div>
                            <div class="w-2/3">
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Тип задания</label>
                                <select id="task-category" class="w-full bg-white border border-slate-200 rounded-lg p-2.5 text-xs outline-none focus:border-sky-400 font-bold text-slate-700 cursor-pointer">
                                    <option value="" disabled selected>Выберите...</option>
                                    <option value="ЧТЕНИЕ БИБЛИИ" id="cat-reading">📖 Чтение Библии</option>
                                    <option value="НАЧИНАЙТЕ РАЗГОВОР">🗣️ Начинайте разговор</option>
                                    <option value="РАЗВИВАЙТЕ ИНТЕРЕС">🌱 Развивайте интерес</option>
                                    <option value="ПОДГОТАВЛИВАЙТЕ УЧЕНИКОВ">👥 Подготавливайте учеников</option>
                                    <option value="ОБЪЯСНЯЙТЕ СВОИ ВЗГЛЯДЫ">💡 Объясняйте взгляды</option>
                                    <option value="РЕЧЬ" id="cat-talk">🎙️ Речь</option>
                                </select>
                            </div>
                        </div>

                        <div class="flex gap-3">
                            <div class="w-1/3">
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Урок</label>
                                <select id="task-lesson" class="w-full bg-white border border-slate-200 rounded-lg p-2.5 text-sm outline-none focus:border-sky-400 font-bold text-slate-700 cursor-pointer">
                                    <option value="" disabled selected>-</option>
                                </select>
                            </div>
                            <div class="w-2/3">
                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Дата</label>
                                <input type="date" id="task-date" class="w-full bg-white border border-slate-200 rounded-lg p-2 text-xs outline-none focus:border-sky-400 font-bold text-slate-700 cursor-pointer">
                            </div>
                        </div>
                    </div>

                    <button id="assign-btn" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 rounded-xl shadow-md transition-all active:scale-95 mt-4 text-sm uppercase tracking-widest">
                        Назначить
                    </button>
                </div>
            </div>
        </div>

        <div class="md:col-span-2">
            <h2 class="text-xl font-black text-slate-800 mb-4">График выступлений</h2>
            <div id="tasks-list" class="space-y-4">
                <p class="text-slate-500 italic p-6 text-center text-sm bg-white rounded-2xl border border-slate-200">Загрузка...</p>
            </div>
        </div>

    </main>

    <script type="module" src="school.js?v=80"></script>
</body>
</html>
