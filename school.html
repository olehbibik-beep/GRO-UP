
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление Школой</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-sky-50 text-slate-800 min-h-screen font-sans">

    <header class="bg-sky-600 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">📚</span>
                <div>
                    <h1 class="text-xl font-bold">Школа</h1>
                    <p class="text-xs text-sky-200">Распределение заданий</p>
                </div>
            </div>
            <a href="admin.html" class="text-sm font-bold bg-sky-700 hover:bg-sky-800 px-4 py-2 rounded-xl transition-colors">Вернуться в Админку</a>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-1">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-sky-100 sticky top-24">
                <h2 class="text-lg font-bold text-sky-900 mb-4">Назначить задание</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Ученик</label>
                        <select id="student-select" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-sky-500 font-medium">
                            <option value="">Загрузка учеников...</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Задание (Например: Речь №2)</label>
                        <input type="text" id="task-title" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-sky-500 font-medium">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Дата</label>
                        <input type="date" id="task-date" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none focus:border-sky-500 font-medium text-slate-700">
                    </div>

                    <button id="assign-btn" class="w-full bg-sky-600 hover:bg-sky-700 text-white font-bold p-4 rounded-xl shadow-md transition-all active:scale-95 mt-2">
                        Назначить
                    </button>
                </div>
            </div>
        </div>

        <div class="md:col-span-2">
            <h2 class="text-xl font-bold mb-4 text-slate-800">Выданные задания</h2>
            <div id="tasks-list" class="space-y-3">
                <p class="text-slate-500 italic">Загрузка...</p>
            </div>
        </div>

    </main>

    <script type="module" src="school.js"></script>
</body>
</html>
