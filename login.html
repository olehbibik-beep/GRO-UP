<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-lang="login_title">Вход - GRO-UP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen font-sans p-4 relative">
    
    <div class="absolute top-4 right-4 md:top-6 md:right-8 z-50">
        <select id="lang-selector" onchange="changeLanguage(this.value)" class="bg-white border border-slate-200 text-slate-500 hover:text-indigo-600 text-xs font-bold rounded-lg p-2 outline-none shadow-sm cursor-pointer transition-colors">
            <option value="ru">🇷🇺 RU</option>
            <option value="cs">🇨🇿 CS</option>
        </select>
    </div>

    <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-6 md:p-8 text-center shadow-2xl relative overflow-hidden border border-slate-100">
        
        <div id="login-section" class="fade-in block">
            <h1 class="text-3xl font-black text-indigo-600 mb-1 tracking-tight">GRO-UP</h1>
            <p class="text-slate-400 text-xs mb-6 font-medium" data-lang="system_desc">Система управления собранием</p>
            
            <div class="flex gap-3 mb-5">
                <input id="login-fname" type="text" data-lang-placeholder="ph_fname" placeholder="Имя" 
                       class="w-1/2 p-3.5 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:border-indigo-500 focus:bg-white text-center font-bold text-sm md:text-base transition-all shadow-inner">
                <input id="login-lname" type="text" data-lang-placeholder="ph_lname" placeholder="Фамилия" 
                       class="w-1/2 p-3.5 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:border-indigo-500 focus:bg-white text-center font-bold text-sm md:text-base transition-all shadow-inner">
            </div>
            
            <div class="mb-8">
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-3" data-lang="enter_pin">Введите ПИН-код (6 цифр)</p>
                <div class="relative w-full h-12 flex justify-center items-center">
                    <input id="login-pin" type="tel" inputmode="numeric" maxlength="6"
                           class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10 text-transparent bg-transparent">
                    <div class="flex gap-3 z-0" id="login-circles">
                        <div class="w-4 h-4 rounded-full border-2 border-slate-300 transition-all duration-200"></div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-300 transition-all duration-200"></div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-300 transition-all duration-200"></div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-300 transition-all duration-200"></div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-300 transition-all duration-200"></div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-300 transition-all duration-200"></div>
                    </div>
                </div>
            </div>
            
            <button id="login-btn" data-lang="btn_login" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold p-4 rounded-2xl shadow-lg shadow-indigo-600/30 transition-all active:scale-95 mb-5 text-sm md:text-base uppercase tracking-widest">
                Войти в систему
            </button>

            <button onclick="toggleView('register')" data-lang="btn_create_user" class="text-slate-400 text-xs md:text-sm font-bold hover:text-indigo-500 transition-colors outline-none pb-2">
                Создать пользователя
            </button>
        </div>

        <div id="register-section" class="fade-in hidden">
            <h1 class="text-2xl font-black text-slate-800 mb-1 tracking-tight" data-lang="register_title">Регистрация</h1>
            <p class="text-slate-400 text-[10px] uppercase tracking-widest mb-5 font-bold" data-lang="create_profile">Создайте профиль</p>
            
            <div class="flex gap-3 mb-4">
                <input id="reg-fname" type="text" data-lang-placeholder="ph_fname" placeholder="Имя" 
                       class="w-1/2 p-3.5 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:border-indigo-500 focus:bg-white text-center font-bold text-sm md:text-base transition-all shadow-inner">
                <input id="reg-lname" type="text" data-lang-placeholder="ph_lname" placeholder="Фамилия" 
                       class="w-1/2 p-3.5 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:border-indigo-500 focus:bg-white text-center font-bold text-sm md:text-base transition-all shadow-inner">
            </div>
            
            <div class="flex gap-3 mb-6">
                <button type="button" onclick="selectGender('boy')" id="gender-boy" class="flex-1 p-4 rounded-2xl border border-slate-200 bg-slate-50 flex items-center justify-center opacity-50 grayscale hover:opacity-100 hover:grayscale-0 transition-all outline-none shadow-sm">
                    <span class="text-4xl leading-none">👨‍💼</span>
                </button>
                <button type="button" onclick="selectGender('girl')" id="gender-girl" class="flex-1 p-4 rounded-2xl border border-slate-200 bg-slate-50 flex items-center justify-center opacity-50 grayscale hover:opacity-100 hover:grayscale-0 transition-all outline-none shadow-sm">
                    <span class="text-4xl leading-none">👩‍💼</span>
                </button>
            </div>

            <div class="mb-6">
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-3" data-lang="create_pin">Придумайте ПИН-код (6 цифр)</p>
                <div class="relative w-full h-12 flex justify-center items-center">
                    <input id="reg-pin" type="tel" inputmode="numeric" maxlength="6"
                           class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10 text-transparent bg-transparent">
                    <div class="flex gap-3 z-0" id="reg-circles">
                        <div class="w-4 h-4 rounded-full border-2 border-slate-300 transition-all duration-200"></div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-300 transition-all duration-200"></div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-300 transition-all duration-200"></div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-300 transition-all duration-200"></div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-300 transition-all duration-200"></div>
                        <div class="w-4 h-4 rounded-full border-2 border-slate-300 transition-all duration-200"></div>
                    </div>
                </div>
            </div>
            
            <button id="reg-btn" data-lang="btn_submit_request" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold p-4 rounded-2xl shadow-lg shadow-slate-800/30 transition-all active:scale-95 mb-5 text-sm md:text-base uppercase tracking-widest">
                Отправить заявку
            </button>

            <button onclick="toggleView('login')" data-lang="btn_already_have_profile" class="text-slate-400 text-xs md:text-sm font-bold hover:text-indigo-500 transition-colors outline-none pb-2">
                Уже есть профиль? Войти
            </button>
        </div>

    </div>

    <script type="module" src="login.js?v=4"></script>
</body>
</html>
