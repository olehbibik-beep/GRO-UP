<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление Графиком</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans">

    <header class="bg-amber-500 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🗓️</span>
                <h1 class="text-xl font-bold">График дежурств</h1>
            </div>
            <a href="admin.html" class="text-sm font-bold bg-amber-600 hover:bg-amber-700 px-4 py-2 rounded-xl transition-colors">В Админку</a>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="md:col-span-1">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-amber-100">
                <h2 class="text-lg font-bold text-amber-900 mb-4">Назначить дежурство</h2>
                <div class="space-y-4">
                    <select id="user-select" class="w-full bg-slate-50 border p-3 rounded-xl outline-none focus:border-amber-500">
                        <option value="">Загрузка пользователей...</option>
                    </select>
                    <select id="duty-type" class="w-full bg-slate-50 border p-3 rounded-xl outline-none focus:border-amber-500">
                        <option value="Уборка зала">Уборка зала</option>
                        <option value="Распорядитель">Распорядитель</option>
                        <option value="Микрофоны">Микрофоны</option>
                        <option value="Звук / Сцена">Звук / Сцена</option>
                        <option value="Специальное событие">Специальное событие</option>
                    </select>
                    <input type="text" id="duty-date-range" placeholder="Например: 4 - 10 мая" class="w-full bg-slate-50 border p-3 rounded-xl outline-none focus:border-amber-500">
                    <button id="save-duty-btn" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold p-4 rounded-xl shadow-md transition-all active:scale-95">Назначить</button>
                </div>
            </div>
        </div>

        <div class="md:col-span-2">
            <h2 class="text-xl font-bold mb-4">Текущий график</h2>
            <div id="duties-list" class="space-y-3">
                <p class="text-slate-500 italic">Загрузка...</p>
            </div>
        </div>
    </main>

    <script type="module" src="duties.js"></script>
</body>
</html>
