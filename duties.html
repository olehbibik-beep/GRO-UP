<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>График Дежурств - GRO-UP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { ui: { bg: '#f8fafc', adminNav: '#1e1b4b' } } } } }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
    </style>
</head>
<body class="bg-ui-bg text-slate-800 min-h-screen font-sans">

    <nav class="fixed bottom-0 left-0 w-full bg-ui-adminNav flex flex-row items-center justify-between z-50 md:top-0 md:h-screen md:w-20 md:flex-col md:justify-start md:py-6 pb-safe border-t border-indigo-900 md:border-t-0">
        <a href="index.html" title="На сайт" class="text-indigo-300 hover:text-white flex flex-col items-center justify-center flex-1 py-4 md:flex-none md:w-full md:mb-4 outline-none transition-colors"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 md:w-7 md:h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" /></svg></a>
        <a href="admin.html" title="Пользователи" class="text-indigo-300 hover:text-white flex flex-col items-center justify-center flex-1 py-4 md:flex-none md:w-full md:mb-4 outline-none transition-colors"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 md:w-7 md:h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M10.341 3.897a.75.75 0 011.318 0l.977 1.977a.75.75 0 00.91.405l2.12-.572a.75.75 0 01.895.895l-.572 2.12a.75.75 0 00.405.91l1.977.977a.75.75 0 010 1.318l-1.977.977a.75.75 0 00-.405.91l.572 2.12a.75.75 0 01-.895.895l-2.12-.572a.75.75 0 00-.91.405l-.977 1.977a.75.75 0 01-1.318 0l-.977-1.977a.75.75 0 00-.91-.405l-2.12.572a.75.75 0 01-.895-.895l.572-2.12a.75.75 0 00-.405-.91l-1.977-.977a.75.75 0 010-1.318l1.977-.977a.75.75 0 00.405-.91l-.572-2.12a.75.75 0 01.895-.895l2.12.572a.75.75 0 00.91-.405l.977-1.977zM12 15a3 3 0 100-6 3 3 0 000 6z" /></svg></a>
        <a href="duties.html" title="График дежурств" class="text-white flex flex-col items-center justify-center flex-1 py-4 md:flex-none md:w-full md:mb-4 outline-none transition-colors"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 md:w-7 md:h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" /></svg></a>
    </nav>

    <main class="w-full max-w-5xl mx-auto pt-4 md:pt-6 px-4 pb-24 md:pl-28 md:pr-6">
        
        <div class="mb-6 flex justify-between items-center bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-3">
                <span class="text-amber-500 text-3xl drop-shadow-sm">🗓️</span>
                <div>
                    <h1 class="text-xl md:text-2xl font-black text-amber-600">График</h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">Управление дежурствами</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8">
            
            <div class="md:col-span-1">
                <div class="bg-white p-5 md:p-6 rounded-2xl shadow-md border border-slate-200 sticky top-6">
                    <h2 class="text-lg font-black text-slate-800 mb-5 flex items-center gap-2">
                        <span class="text-amber-500">➕</span> Назначить
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Тип дежурства</label>
                            <select id="duty-type" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm outline-none focus:border-amber-400 font-bold text-slate-700">
                                <option value="Уборка зала">🧹 Уборка зала</option>
                                <option value="Распорядитель">👔 Распорядитель</option>
                                <option value="Микрофоны">🎤 Микрофоны</option>
                                <option value="Звук / Сцена">🎛️ Звук / Сцена</option>
                                <option value="Специальное событие">⭐ Специальное событие</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Начальная группа (пусто = Все)</label>
                            <input type="number" id="duty-group" placeholder="Например: 1" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm outline-none focus:border-amber-400 font-bold text-slate-700">
                        </div>
                        
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">С понедельника (Дата начала)</label>
                            <input type="date" id="duty-date" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm outline-none focus:border-amber-400 font-bold text-slate-700">
                        </div>

                        <div class="bg-amber-50 p-4 rounded-xl border border-amber-100 mt-2">
                            <label class="flex items-center gap-2 cursor-pointer mb-2">
                                <input type="checkbox" id="duty-recurring" class="w-4 h-4 accent-amber-600 rounded cursor-pointer" onchange="document.getElementById('weeks-container').classList.toggle('hidden')">
                                <span class="text-xs font-bold text-amber-900 uppercase tracking-wide mt-0.5">Авто-раскидать на месяц</span>
                            </label>
                            <div id="weeks-container" class="hidden flex items-center justify-between gap-2 mt-3 bg-white p-2 rounded-lg border border-amber-200">
                                <span class="text-xs text-amber-700 font-bold">На сколько недель?</span>
                                <input type="number" id="duty-weeks" value="4" min="2" max="12" class="w-16 p-1.5 text-center font-black text-amber-900 bg-amber-50 rounded-md border border-amber-200 outline-none">
                            </div>
                        </div>

                        <button id="save-duty-btn" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 rounded-xl shadow-md transition-all active:scale-95 mt-4 text-sm uppercase tracking-widest outline-none">
                            Назначить
                        </button>
                    </div>
                </div>
            </div>

            <div class="md:col-span-2">
                <h2 class="text-xl font-black text-slate-800 mb-4 flex items-center gap-2">Текущий график</h2>
                <div id="duties-list" class="bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col overflow-hidden">
                    <p class="text-slate-500 italic p-6 text-center text-sm">Загрузка...</p>
                </div>
            </div>

        </div>
    </main>

    <script type="module" src="duties.js?v=95"></script>
</body>
</html>
