<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Полный Календарь - GRO-UP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 
                        ui: { bg: '#cbd5e1', nav: '#0f172a' },
                        brand: { green: '#68c086', dark: '#141724' } /* Твои цвета из логотипа */
                    } 
                } 
            } 
        }
    </script>
    <style>
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { display: block; width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-ui-bg font-sans text-slate-800 overflow-hidden w-full h-[100dvh]">

    <nav class="fixed bottom-0 left-0 w-full bg-ui-nav flex flex-row items-center justify-between z-40 pb-safe md:h-[100dvh] md:w-20 md:flex-col md:justify-start md:py-6 md:border-t-0">
        <a href="index.html" class="nav-btn group flex flex-col items-center justify-center flex-1 py-3 md:flex-none md:w-full outline-none transition-colors">
            <div class="nav-icon-container text-slate-500 hover:text-white p-2.5 rounded-full transition-colors flex flex-col items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 md:w-7 md:h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                <span class="text-[8px] font-black uppercase tracking-widest hidden md:block">Назад</span>
            </div>
        </a>
    </nav>

    <main class="w-full max-w-2xl mx-auto h-[100dvh] pt-4 md:pt-6 pb-20 md:pb-6 md:pl-24 md:pr-6 flex flex-col">
        
        <div class="h-[10%] shrink-0 flex items-center justify-between px-2 w-full">
            <h1 class="text-xl md:text-2xl font-black text-slate-800 leading-tight">Весь год</h1>
            <div class="flex items-center gap-4 bg-white px-4 py-1.5 rounded-lg shadow-sm border border-slate-200">
                <button onclick="changeYear(-1)" class="text-slate-400 hover:text-brand-green text-2xl font-black transition-colors outline-none">‹</button>
                <div id="display-year" class="text-xl font-black text-slate-800 w-12 text-center">2026</div>
                <button onclick="changeYear(1)" class="text-slate-400 hover:text-brand-green text-2xl font-black transition-colors outline-none">›</button>
            </div>
        </div>

        <div class="h-[35%] shrink-0 w-full pb-2">
            <div id="months-grid" class="grid grid-cols-4 grid-rows-3 gap-2 h-full">
                </div>
        </div>

        <div class="h-[55%] flex-grow w-full bg-white rounded-t-3xl shadow-sm flex flex-col pt-4 px-4 pb-2 border-t border-slate-200 relative">
            <h2 id="month-title" class="text-center font-black text-slate-800 uppercase tracking-widest text-sm mb-2">МЕСЯЦ</h2>
            
            <div class="grid grid-cols-7 gap-1 text-center text-[10px] font-bold text-slate-400 mb-2 shrink-0">
                <span>ПН</span><span>ВТ</span><span>СР</span><span>ЧТ</span><span>ПТ</span><span>СБ</span><span>ВС</span>
            </div>
            
            <div id="days-grid" class="grid grid-cols-7 gap-1 flex-1 overflow-y-auto custom-scrollbar content-start pb-4">
                </div>
        </div>
    </main>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/80 z-[100] items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-xl p-5 shadow-2xl relative flex flex-col">
            <button onclick="closeModal()" class="absolute top-3 right-4 text-slate-400 hover:text-slate-600 text-xl font-black outline-none transition-colors">✖</button>
            
            <h3 id="modal-title" class="text-brand-green font-black text-center mb-5 uppercase tracking-widest text-sm pr-6"></h3>
            
            <div id="modal-list" class="max-h-64 overflow-y-auto custom-scrollbar space-y-2 pr-2">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCwflIUs2AnBRIIxrssVpbpykHwG2436q0",
            authDomain: "gro-uping.firebaseapp.com",
            projectId: "gro-uping",
            storageBucket: "gro-uping.firebasestorage.app",
            messagingSenderId: "819938349545",
            appId: "1:819938349545:web:a00c3bef66d99f5b6cfb78"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const userId = localStorage.getItem('userId');
        if (!userId) window.location.href = 'index.html';

        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth(); 
        
        let allEvents = {}; // year -> month -> day -> array of events

        window.changeYear = (dir) => {
            currentYear += dir;
            document.getElementById('display-year').innerText = currentYear;
            renderMonths();
            renderDays();
        };

        window.selectMonth = (mIdx) => {
            currentMonth = mIdx;
            renderMonths();
            renderDays();
        };

        function renderMonths() {
            const grid = document.getElementById('months-grid');
            let html = '';
            for (let i = 0; i < 12; i++) {
                const isSelected = (i === currentMonth);
                // ИСПРАВЛЕНИЕ: Выделенный месяц просто красится в зеленый (из логотипа), без увеличения (scale)
                const bgClass = isSelected ? 'bg-brand-green text-white shadow-sm' : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-50';
                
                html += `
                    <button onclick="selectMonth(${i})" class="${bgClass} rounded-lg flex items-center justify-center font-black text-[10px] md:text-xs uppercase tracking-widest transition-colors outline-none">
                        ${monthsNames[i].substring(0,3)}
                    </button>
                `;
            }
            grid.innerHTML = html;
            document.getElementById('month-title').innerText = `${monthsNames[currentMonth]} ${currentYear}`;
        }

        function renderDays() {
            const grid = document.getElementById('days-grid');
            grid.innerHTML = '';
            
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const shift = firstDay === 0 ? 6 : firstDay - 1; 
            const totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();
            const now = new Date();

            for (let i = 0; i < shift; i++) {
                grid.innerHTML += `<div class="aspect-square"></div>`;
            }

            for (let d = 1; d <= totalDays; d++) {
                const isToday = (d === now.getDate() && currentMonth === now.getMonth() && currentYear === now.getFullYear());
                const dayEvents = (allEvents[currentYear] && allEvents[currentYear][currentMonth] && allEvents[currentYear][currentMonth][d]) || [];
                
                let dotsHtml = '';
                dayEvents.forEach(ev => {
                    // Синие точки - обычная встреча. Красные точки - особое событие.
                    // ИСПРАВЛЕНИЕ: Размер точки теперь w-1 h-1 (очень маленькие)
                    let dotColor = 'bg-sky-500';
                    if (ev.category === 'special') dotColor = 'bg-rose-500';
                    dotsHtml += `<div class="w-1 h-1 rounded-full ${dotColor}"></div>`;
                });

                const todayClass = isToday ? 'border-2 border-brand-green text-brand-green bg-green-50' : 'bg-slate-50 border border-slate-100 text-slate-700';

                grid.innerHTML += `
                    <div onclick="openModal(${d})" class="aspect-square rounded-lg ${todayClass} flex flex-col items-center justify-center text-sm md:text-base font-black relative cursor-pointer hover:bg-slate-100 transition-colors">
                        ${d}
                        <div class="absolute bottom-1.5 flex gap-1 justify-center w-full px-1 flex-wrap">
                            ${dotsHtml}
                        </div>
                    </div>
                `;
            }
        }

        window.openModal = (d) => {
            document.getElementById('modal-title').innerText = `${d} ${monthsNames[currentMonth]}`;
            const list = document.getElementById('modal-list');
            const dayEvents = (allEvents[currentYear] && allEvents[currentYear][currentMonth] && allEvents[currentYear][currentMonth][d]) || [];
            
            list.innerHTML = dayEvents.map((ev) => {
                // ИСПРАВЛЕНИЕ: Темно-графитовая карточка
                const badgeClass = 'bg-brand-dark text-white border border-slate-700';
                // Особые события помечаем красной линией сбоку
                const specialBorder = ev.category === 'special' ? 'border-l-4 border-l-rose-500' : 'border-l-4 border-l-sky-500';

                const timeHtml = ev.time ? `<span class="text-[10px] text-slate-400 font-mono font-black mr-2">${ev.time}</span>` : '';
                const groupHtml = ev.group !== "Все" ? `<span class="text-[8px] bg-slate-800 text-slate-300 px-1.5 py-0.5 rounded ml-2 whitespace-nowrap">Гр. ${ev.group}</span>` : '';

                return `
                    <div class="flex flex-col p-3 rounded-lg ${badgeClass} ${specialBorder}">
                        <div class="flex items-center">
                            ${timeHtml}
                            <span class="text-xs font-bold leading-tight flex-grow">${ev.title}</span>
                            ${groupHtml}
                        </div>
                        ${ev.leader ? `<div class="text-[9px] uppercase font-bold text-brand-green mt-1.5 tracking-wider">Вед: ${ev.leader}</div>` : ''}
                    </div>
                `;
            }).join('') || '<p class="text-xs text-slate-400 text-center italic py-4">Событий нет</p>';
            
            document.getElementById('modal').style.display = 'flex';
        };

        window.closeModal = () => document.getElementById('modal').style.display = 'none';

        const q = query(collection(db, "events"), orderBy("date", "asc"));
        onSnapshot(q, (snapshot) => {
            allEvents = {};
            snapshot.forEach(docSnap => {
                const ev = docSnap.data();
                const dObj = new Date(ev.date);
                const y = dObj.getFullYear();
                const m = dObj.getMonth();
                const d = dObj.getDate();

                if (!allEvents[y]) allEvents[y] = {};
                if (!allEvents[y][m]) allEvents[y][m] = {};
                if (!allEvents[y][m][d]) allEvents[y][m][d] = [];

                allEvents[y][m][d].push(ev);
            });
            renderDays();
        });

        document.getElementById('display-year').innerText = currentYear;
        renderMonths();
    </script>
</body>
</html>
