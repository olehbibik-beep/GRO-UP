<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Полный Календарь - GRO-UP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 
                        ui: { bg: '#cbd5e1', adminNav: '#1e1b4b' } 
                    } 
                } 
            } 
        }
    </script>
    <style>
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; overflow-x: hidden; }
        .dot { width: 6px; height: 6px; border-radius: 50%; }
        .dot.memorial { background-color: #ef4444; } /* Red-500 */
        .dot.congress { background-color: #8b5cf6; } /* Violet-500 */
        .dot.meeting { background-color: #0ea5e9; }  /* Sky-500 */
    </style>
</head>
<body class="bg-ui-bg text-slate-800 min-h-screen font-sans pb-24">

    <nav class="fixed bottom-0 left-0 w-full bg-ui-adminNav flex flex-row items-center justify-center z-50 md:top-0 md:h-screen md:w-20 md:flex-col md:justify-start md:py-6 pb-safe border-t border-indigo-900 md:border-t-0">
        <a href="index.html" title="Назад" class="flex flex-col items-center justify-center py-4 w-full md:flex-none md:mb-4 outline-none transition-colors text-indigo-300 hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
        </a>
    </nav>

    <main class="w-full max-w-3xl mx-auto pt-4 md:pt-6 px-4 md:pl-28 md:pr-6">
        
        <div class="mb-4 flex flex-col md:flex-row justify-between items-center bg-white p-4 rounded-lg border border-slate-200 gap-4">
            <div class="flex items-center gap-3">
                <span class="text-rose-500 text-3xl">📅</span>
                <div>
                    <h1 class="text-xl md:text-2xl font-black text-rose-600 leading-tight">Весь год</h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">Архив событий собрания</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4 bg-slate-50 px-4 py-2 rounded-lg border border-slate-200">
                <button onclick="changeYear(-1)" class="text-slate-400 hover:text-rose-500 text-2xl font-black transition-colors outline-none">‹</button>
                <div id="display-year" class="text-2xl font-black text-slate-800 w-16 text-center">2026</div>
                <button onclick="changeYear(1)" class="text-slate-400 hover:text-rose-500 text-2xl font-black transition-colors outline-none">›</button>
            </div>
        </div>

        <div id="months-grid" class="grid grid-cols-3 md:grid-cols-4 gap-3 md:gap-4 mb-6">
            </div>

        <div class="bg-white p-4 rounded-lg border border-slate-200">
            <h2 class="text-sm font-black text-slate-800 uppercase tracking-widest mb-4 border-b border-slate-100 pb-2">Ближайшие крупные события</h2>
            <div id="upcoming-events" class="flex flex-col gap-2">
                <p class="text-xs text-slate-400 italic text-center py-4">Загрузка...</p>
            </div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Firebase от Calendarium (как было в твоем оригинальном файле)
        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        let currentYear = parseInt(localStorage.getItem('selectedYear')) || new Date().getFullYear();

        window.changeYear = (dir) => {
            currentYear += dir;
            document.getElementById('display-year').innerText = currentYear;
            localStorage.setItem('selectedYear', currentYear);
            renderMonths();
            loadUpcoming();
        };

        function renderMonths() {
            const grid = document.getElementById('months-grid');
            const now = new Date();
            const todayMonth = now.getMonth(); 
            const todayYear = now.getFullYear();

            let html = '';
            for (let i = 0; i < 12; i++) {
                const isToday = (i === todayMonth && currentYear === todayYear);
                const bgClass = isToday ? 'bg-rose-50 border-rose-200' : 'bg-white border-slate-200 hover:bg-slate-50';
                const textClass = isToday ? 'text-rose-600' : 'text-slate-700';

                html += `
                    <div onclick="goToMonth(${i})" class="${bgClass} border rounded-lg aspect-square flex flex-col items-center justify-center cursor-pointer transition-colors relative group">
                        <span class="text-3xl md:text-4xl font-black ${textClass} opacity-20 group-hover:opacity-100 transition-opacity absolute">
                            ${(i + 1).toString().padStart(2, '0')}
                        </span>
                        <span class="z-10 font-bold text-xs md:text-sm uppercase tracking-widest ${textClass}">${monthsNames[i]}</span>
                        <div id="ind-${i}" class="absolute bottom-3 flex gap-1 z-10"></div>
                    </div>
                `;
            }
            grid.innerHTML = html;
        }

        window.goToMonth = (i) => {
            localStorage.setItem('selectedMonth', i);
            localStorage.setItem('selectedYear', currentYear);
            // Если у тебя есть страница notes.html, переход сработает. Если нет - создай ее или убери эту строку.
            window.location.href = 'notes.html';
        };

        async function loadUpcoming() {
            const container = document.getElementById('upcoming-events');
            
            const now = new Date();
            const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            let upcomingEvents = [];

            const monthPromises = Array.from({length: 12}, (_, i) => getDoc(doc(db, "calendar", `${currentYear}_${i}`)));
            const snapshots = await Promise.all(monthPromises);

            snapshots.forEach((snap, i) => {
                if (snap.exists()) {
                    const data = snap.data();
                    const ind = document.getElementById(`ind-${i}`);
                    
                    let hasMemorial = false, hasCongress = false, hasMeeting = false;

                    Object.entries(data).forEach(([day, notes]) => {
                        if (!Array.isArray(notes)) return;
                        notes.forEach(n => {
                            if (n.category === 'memorial') hasMemorial = true;
                            else if (n.category === 'congress') hasCongress = true;
                            else hasMeeting = true;
                            
                            const eventDate = new Date(currentYear, i, parseInt(day)).getTime();
                            if (eventDate >= todayStart) {
                                upcomingEvents.push({ text: n.text, day: day, mName: monthsNames[i], stamp: eventDate, cat: n.category });
                            }
                        });
                    });

                    if (ind) {
                        if (hasMemorial) ind.innerHTML += '<div class="dot memorial"></div>';
                        if (hasCongress) ind.innerHTML += '<div class="dot congress"></div>';
                        if (hasMeeting) ind.innerHTML += '<div class="dot meeting"></div>';
                    }
                }
            });

            upcomingEvents.sort((a, b) => a.stamp - b.stamp);
            
            if (upcomingEvents.length > 0) {
                let html = '';
                upcomingEvents.slice(0, 5).forEach(ev => {
                    let borderClass = 'border-sky-500';
                    if (ev.cat === 'memorial') borderClass = 'border-red-500';
                    if (ev.cat === 'congress') borderClass = 'border-violet-500';

                    html += `
                        <div class="flex items-center justify-between p-3 bg-slate-50 rounded-lg border-l-4 ${borderClass}">
                            <span class="text-xs font-bold text-slate-700">${ev.text}</span>
                            <span class="text-[10px] font-black uppercase text-slate-400 shrink-0 bg-white px-2 py-1 rounded">${ev.day} ${ev.mName}</span>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } else {
                container.innerHTML = '<p class="text-xs text-slate-400 italic text-center py-2">Событий не найдено</p>';
            }
        }

        document.getElementById('display-year').innerText = currentYear;
        renderMonths();
        loadUpcoming();
    </script>
</body>
</html>
