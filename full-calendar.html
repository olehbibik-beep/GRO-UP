<!DOCTYPE html>
<html lang="ru">
<head>
    <meta name="view-transition" content="same-origin">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Главная | CALENDARIUM</title>
    <style>

    /* =========================================

       1. ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ (:root)

       ========================================= */

    :root { 

        /* --- ЦВЕТОВАЯ БИБЛИОТЕКА --- */

        /* Основные цвета бренда и UI */

        --color-accent: #09e0e3;              /* Главный акцентный цвет (бирюзовый) */

        --color-bg-main: #71797E;             /* Фон за пределами приложения (серый) */

        --color-bg-app: #0f1112;              /* Главный фон самого приложения (темный) */

        --color-bg-nav: rgba(120, 120, 120, 0.3); /* Фон левой панели навигации */

        --color-bg-sidebar: rgba(80, 80, 80, 0.2);/* Фон боковой панели (актуальное) */

        --color-bg-card: #00FFFF;             /* Базовый фон для карточек (если нужно) */

        --color-bg-board-card: rgba(255,255,255,0.03); /* Карточка объявления */

        

        /* Цвета календаря */

        --color-bg-month: #00D18F;            /* Цвет карточки месяца (зеленый) */

        --color-bg-month-hover: #D1F7BF;      /* Цвет месяца при наведении (светло-зеленый) */

        

        /* Текстовые цвета */

        --color-text-main: #e0e6ed;           /* Основной текст */

        --color-text-white: #ffffff;          /* Белый текст */

        --color-text-black: #000000;          /* Черный текст */

        --color-text-muted: #7f8fa6;          /* Приглушенный текст (даты, подписи) */

        --color-text-year: #3d444b;           /* Цвет боковых цифр года */

        --color-text-transparent: rgba(255, 255, 255, 0.1);      /* Сильно прозрачный текст (плейсхолдеры) */

        --color-text-transparent-half: rgba(255, 255, 255, 0.5); /* Полупрозрачный текст (иконки доски) */

        --color-error: #ff7675;               /* Цвет ошибок */



        /* Цвета иконок */

        --color-icon-accent: #52525C;         /* Приглушенный цвет иконок профиля/настроек */

        --color-icon-exit: #ff4757;           /* Цвет иконки выхода при наведении (красный) */



        /* Цвета СОБЫТИЙ (Индикаторы и рамки) */

        --color-ev-memorial: #D10000;         /* Вечеря / Важные мемориалы (Красный) */

        --color-ev-congress: #8E44AD;         /* Конгрессы (Фиолетовый - НОВЫЙ ЦВЕТ) */

        --color-ev-meeting: #056D71;          /* Встречи собрания (Темно-бирюзовый) */



        /* Рамки, ховеры (наведения) и эффекты прозрачности */

        --color-border-inner: rgba(255, 255, 255, 0.05); /* Легкие внутренние разделители */

        --color-border-dashed: rgba(255, 255, 255, 0.1); /* Цвет прерывистой рамки событий */

        --color-hover-light: rgba(255, 255, 255, 0.08);  /* Легкая подсветка фона при наведении */

        --color-hover-medium: rgba(255, 255, 255, 0.12); /* Подсветка фона при клике/выделении */

        --color-hover-strong: rgba(255, 255, 255, 0.2);  /* Цвет рамок при наведении */

        --color-hover-board-card: rgba(255,255,255,0.06);/* Подсветка карточки объявления */

        

        /* Оверлеи и тени */

        --color-shadow-app: rgba(0, 0, 0, 0.5);          /* Тень главного контейнера приложения */

        --color-shadow-month: rgba(0, 0, 0, 0.4);        /* Тень карточки месяца при наведении */

        --color-shadow-icon: rgba(255, 255, 255, 0.5);   /* Свечение иконок при наведении */

        --color-overlay-month: rgba(0, 0, 0, 0.3);       /* Затемнение картинки в линейном режиме */

        --color-overlay-board: rgba(15, 17, 18, 0.95);   /* Фон панели объявлений */

        --color-overlay-dark: rgba(0, 0, 0, 0.95);       /* Фон просмотрщика картинок */



        /* --- БИБЛИОТЕКА РАЗМЕРОВ И ПОЛОЖЕНИЙ --- */

        --size-app-width: 95vw;

        --size-app-height: 90dvh;

        --size-app-max-width: 1400px;

        --size-app-max-height: 900px;

        --size-app-radius: 30px;

        

        --size-nav-width: 60px;

        --size-sidebar-width: 20%;

        --size-sidebar-min-width: 200px;

        --size-sidebar-max-width: 220px;

        --size-dot-height: 4px;

    }

    

    /* =========================================

       2. БАЗОВЫЕ НАСТРОЙКИ

       ========================================= */

    * { 

        box-sizing: border-box; 

        font-family: 'Inter', sans-serif; 

        -webkit-tap-highlight-color: transparent; 

    }

    

    body { 

        margin: 0; padding: 0; 

        background: var(--color-bg-main); color: var(--color-text-main); 

        display: flex; align-items: center; justify-content: center; 

        height: 100dvh; width: 100vw; 

        overflow: hidden; 

    }



    /* =========================================

       3. ГЛАВНЫЕ КОНТЕЙНЕРЫ (КАРКАС ПРИЛОЖЕНИЯ)

       ========================================= */

    .app-container {

        width: var(--size-app-width); height: var(--size-app-height); 

        max-width: var(--size-app-max-width); max-height: var(--size-app-max-height);

        background: var(--color-bg-app);

        border-radius: var(--size-app-radius); 

        display: flex; flex-direction: row; 

        overflow: hidden;

        box-shadow: 0 20px 50px var(--color-shadow-app);

    }



    /* =========================================

       4. ЛЕВАЯ ПАНЕЛЬ НАВИГАЦИИ (МЕНЮ)

       ========================================= */

    .nav-bar {

        width: var(--size-nav-width);

        background: var(--color-bg-nav);

        border-right: 0px solid var(--color-border-inner);

        display: flex; flex-direction: column; align-items: center; justify-content: space-between;

        padding: 3vh 0; flex-shrink: 0; z-index: 20;

    }

    .nav-group { display: flex; flex-direction: column; align-items: center; gap: 20px; }



    /* =========================================

       5. БОКОВАЯ ПАНЕЛЬ (АКТУАЛЬНОЕ)

       ========================================= */

    .sidebar { 

        width: var(--size-sidebar-width); min-width: var(--size-sidebar-min-width); max-width: var(--size-sidebar-max-width); 

        background: var(--color-bg-sidebar);

        padding: 3vh 4px; 

        display: flex; flex-direction: column; 

        border-right: 0px solid var(--color-border-inner); 

        flex-shrink: 0;

        box-sizing: border-box;

    }



    .upcoming-box { overflow-y: auto; flex: 1; padding: 0; width: 100%; }



    .event-card-mini { 

        background: transparent; 

        padding: 10px 8px; 

        border-radius: 4px; 

        margin-bottom: 10px; 

        border: 1px dashed var(--color-border-dashed); 

        border-left: 4px solid var(--color-accent);

        transition: all 0.2s ease; 

        cursor: pointer;

        width: 100%;

        box-sizing: border-box;

    }



    .event-card-mini:hover { 

        background: var(--color-hover-light); 

        border-color: var(--color-hover-strong); 

        padding-left: 8px; 

    }



    .event-card-mini:active {

        background: var(--color-hover-medium);

        transform: scale(0.98);

    }



    .ev-title { 

        font-size: clamp(0.7rem, 1vw, 0.85rem); 

        font-weight: 400; 

        color: var(--color-text-white); 

        margin-bottom: 4px; 

        line-height: 1.3;

    }



    .ev-date { 

        font-size: clamp(0.6rem, 0.8vw, 0.75rem); 

        color: var(--color-text-muted); 

    }



    /* =========================================

       6. ИНДИКАТОРЫ (ТОЧКИ В КАЛЕНДАРЕ)

       ========================================= */

    .dot { 

        height: var(--size-dot-height); 

        width: 100%; 

        max-width: 15px; 

        border-radius: 4px; 

    }

    .dot.red { background: var(--color-ev-memorial); }

    .dot.congress { background: var(--color-ev-congress); } /* Новый цвет конгрессов */

    .dot.blue { background: var(--color-ev-meeting); }



    /* =========================================

       7. УНИВЕРСАЛЬНЫЕ КНОПКИ И ИКОНКИ

       ========================================= */

    .icon-btn { 

        background: none; border: none; padding: 5px; cursor: pointer; 

        display: flex; align-items: center; justify-content: center; outline: none;

        flex-shrink: 0; z-index: 50; 

    }

    .ui-icon {

        font-family: "Segoe UI Symbol", "Symbola", "Apple Color Emoji", "Noto Color Emoji", sans-serif;

        font-size: 22px; line-height: 1; display: inline-flex; align-items: center; justify-content: center;

        transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); user-select: none; color: var(--color-text-white); opacity: 0.5;

    }

    .icon-btn:hover .ui-icon { opacity: 1; text-shadow: 0 0 10px var(--color-shadow-icon); }

    .ui-icon-accent { color: var(--color-icon-accent); opacity: 0.8; }

    .icon-btn:hover .ui-icon-accent { color: var(--color-accent); }

    .icon-btn-exit:hover .ui-icon { color: var(--color-icon-exit) !important; }



    /* =========================================

       8. ОСНОВНАЯ ОБЛАСТЬ (КАЛЕНДАРЬ И ИЛЛЮСТРАЦИЯ)

       ========================================= */

    .main-view { 

        flex: 1; display: flex; flex-direction: row; align-items: center;

        padding: 3vh 3vw; position: relative; overflow: hidden; gap: 2vw;

    }



    .illustration-box {

        width: 20%; 

        display: flex; align-items: center; justify-content: center;

    }

    .illustration-placeholder {

        color: var(--color-text-transparent); border: 2px;

        border-radius: 20px; padding: 20px; text-align: center; font-size: 0.8rem;

    }



    .calendar-wrapper {

        flex: 1; display: flex; flex-direction: column; height: 80%; transition: 0.3s;

    }



    .main-view.linear-active .illustration-box { display: none !important; }



    .year-switcher { 

        display: flex; align-items: center; justify-content: flex-end; gap: 1.5vw; 

        margin-bottom: 2vh; flex-shrink: 0; 

    }

    #display-year { font-size: clamp(2.5rem, 6vh, 5rem); font-weight: 300; letter-spacing: -2px; color: var(--color-text-white); line-height: 1; }

    .year-side { cursor: pointer; color: var(--color-text-year); font-weight: 300; font-size: clamp(1.2rem, 3vh, 2rem); transition: 0.2s; }

    .year-side:hover { color: var(--color-accent); }



    .months-grid { 

        display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(3, 1fr); 

        gap: clamp(8px, 1.5vh, 20px); width: 100%; height: 100%; flex: 1; min-height: 0; 

    }

    .month-card { 

        background: var(--color-bg-month); border-radius: 18px;

        display: flex; flex-direction: column; align-items: center; justify-content: center; 

        color: var(--color-text-black); font-weight: 600; cursor: pointer; position: relative; transition: 0.3s;

        text-transform: uppercase; font-size: clamp(0.6rem, 1.2vh + 0.4vw, 1.1rem);

        white-space: nowrap; padding: 0 5px;

        height: 100%; width: 100%; border: 0px solid transparent; overflow: hidden;

    }

    .month-card:hover { background: var(--color-bg-month-hover); box-shadow: 0 8px 15px var(--color-shadow-month); }

    

    .month-card.current-active { 

        z-index: 10; background: var(--color-bg-month-hover); color: var(--color-text-black); box-shadow: 0 8px 15px var(--color-shadow-month);

    }

    .month-card.current-active::before { display: none !important; }



    .months-grid.linear-mode {

        display: flex !important; flex-direction: row !important; gap: 6px; 

        align-items: stretch; overflow: hidden !important; touch-action: none;

    }

    .months-grid.linear-mode .month-card {

        flex: 1; min-width: 0; height: 100%; border-radius: 12px;

        background-color: var(--color-bg-month); 

        background-image: var(--bg-img);

        background-size: 50%; background-repeat: no-repeat; background-position: center;  

        font-size: 0.6rem; color: var(--color-text-white);

    }

    .months-grid.linear-mode .month-card:hover { z-index: 5; background: var(--color-bg-month-hover); filter: brightness(0.9); }

    .months-grid.linear-mode .month-card:hover::before { background: var(--color-hover-light); }

    .months-grid.linear-mode .month-card::before { content: ''; position: absolute; inset: 0; z-index: 1; background: var(--color-overlay-month); }

    .months-grid.linear-mode .month-card span,

    .months-grid.linear-mode .month-card .month-indicator { z-index: 2; }

    .months-grid.linear-mode .month-indicator { width: 30%; bottom: 5%; flex-direction: column; gap: 2px; }



    .m-num { display: none; font-size: 0.6rem; font-weight: 700; margin-bottom: 4px; }

    .months-grid.linear-mode .m-num { display: block; }



    .month-indicator { position: absolute; bottom: 10%; display: flex; gap: 4px; width: 20%; justify-content: center; }



    /* =========================================

       9. ПАНЕЛЬ ОБЪЯВЛЕНИЙ (BOARD)

       ========================================= */

    .board-toggle-btn {

        position: absolute; right: 0; top: 50%; transform: translateY(-50%);

        background: var(--color-border-inner); border: none; padding: 25px 8px;

        border-radius: 12px 0 0 12px; cursor: pointer; z-index: 100; transition: 0.3s;

    }

    .board-toggle-btn:hover { background: var(--color-accent); }

    .board-toggle-btn .board-icon { color: var(--color-text-transparent-half); font-size: 12px; transition: 0.3s; }

    .board-toggle-btn:hover .board-icon { color: var(--color-text-black); }



    .announcements-overlay {

        position: absolute; inset: 0; background: var(--color-overlay-board); backdrop-filter: blur(10px);

        z-index: 200; display: flex; flex-direction: column; padding: 40px;

        transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);

    }

    .announcements-overlay.active { transform: translateX(0); }

    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--color-border-inner); padding-bottom: 15px; }

    .panel-header h2 { margin: 0; font-weight: 300; letter-spacing: 2px; color: var(--color-accent); }

    .close-panel-btn { background: none; border: none; color: var(--color-text-white); font-size: 24px; cursor: pointer; transition: 0.2s; }

    .close-panel-btn:hover { color: var(--color-accent); transform: scale(1.1); }

    .board-items { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding-right: 10px; overflow-y: auto; flex: 1; align-content: start; }

    .board-card { background: var(--color-bg-board-card); padding: 20px; border-radius: 8px; border-top: 3px solid var(--color-accent); display: flex; flex-direction: column; gap: 10px; transition: transform 0.2s ease; }

    .board-card:hover { background: var(--color-hover-board-card); }

    .board-card h3 { margin: 0 0 10px 0; font-size: 1.1rem; color: var(--color-text-white); font-weight: 600; }

    .board-card p { margin: 0; color: var(--color-text-muted); font-size: 0.9rem; line-height: 1.5; white-space: pre-wrap; }



    .image-viewer { display: none; position: fixed; inset: 0; background: var(--color-overlay-dark); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }

    .image-viewer img { max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: 8px; }

    .close-viewer { position: absolute; top: 20px; right: 30px; font-size: 2.5rem; color: var(--color-text-white); font-weight: 300; cursor: pointer; transition: 0.2s; }

    .close-viewer:hover { color: var(--color-ev-memorial); }



    /* =========================================

       10. АДАПТИВНОСТЬ (МОБИЛКИ)

       ========================================= */

    @media (max-width: 1200px) { .board-items { grid-template-columns: repeat(3, 1fr); } }

    @media (max-width: 900px) { .board-items { grid-template-columns: repeat(2, 1fr); } }



    @media (orientation: portrait) {

        body { background: var(--color-bg-app); }

        .app-container { width: 100vw; height: 100dvh; max-height: none; max-width: none; border-radius: 0; flex-direction: column; box-shadow: none; }

        

        .nav-bar { 

            width: 100%; height: auto; flex-direction: row; padding: 1vh 4vw; 

            border-right: none; border-bottom: 1px solid var(--color-border-inner); 

        }

        .nav-group { flex-direction: row; gap: 15px; }

        

        .sidebar { width: 100%; max-width: 100%; height: auto; max-height: 35dvh; padding: 2vh 4vw 1vh; border-right: none; border-bottom: 1px solid var(--color-border-inner); background: var(--color-bg-app); flex-direction: column; align-items: stretch; justify-content: flex-start; }

        .upcoming-box .event-card-mini:nth-of-type(n+4) { display: none; }

        

        .main-view { padding: 1vh 4vw 2vh; flex: 1; flex-direction: column; justify-content: space-between; min-height: 0; }

        .illustration-box { display: none !important; }

        .calendar-wrapper { width: 100%; height: 100%; }



        .months-grid { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(4, 1fr); gap: 8px; }

        .month-card { border-radius: 12px; font-size: clamp(0.7rem, 2vh, 1rem); }

        .board-items { grid-template-columns: 1fr; gap: 15px; }

        .announcements-overlay { padding: 20px; }

    }

    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="nav-bar">
            <div class="nav-group">
                <button class="icon-btn icon-btn-exit" onclick="localStorage.clear(); location.href='index.html'" title="Выход">
                    <span class="ui-icon">✕</span>
                </button>
                
                <button class="icon-btn" title="Профиль">
                    <span class="ui-icon">👤</span>
                </button>

                <button id="admin-btn" class="icon-btn" onclick="location.href='admin.html'" style="display:none;" title="Настройки">
                    <span class="ui-icon ui-icon-accent">⚙</span>
                </button>

                <button class="icon-btn" id="board-edit-btn" onclick="location.href='board.html'" title="Редактор Объявлений" style="display: none;">
                    <span class="ui-icon ui-icon-accent">✏</span>
                </button>

                </div>

            <div class="nav-group">
                <button class="icon-btn" title="Информация">
                    <span class="ui-icon">ⓘ</span>
                </button>
            </div>
        </div>

        <div class="sidebar">
            <div class="section-title">АКТУАЛЬНОЕ</div>
            <div class="upcoming-box" id="next-event-container">
                <div style="font-size:0.6rem; color:var(--color-text-muted); opacity:0.3; text-align:center;">ЗАГРУЗКА...</div>
            </div>
        </div>

        <div class="main-view" id="main-view">
            
            <div class="illustration-box" id="illustration-box">
                <div class="illustration-placeholder">
                    <img src="TABL.png" alt="Person" style="max-width: 100%; max-height: 100%; object-fit: contain;">
                    </div>
            </div>

            <div class="calendar-wrapper">
                <div class="year-switcher">
                    <button class="icon-btn" onclick="toggleCalendarView()" title="Сменить вид" style="margin-right: auto; opacity: 0.5;">
                        <span class="ui-icon" style="font-size: 18px;">⌗</span>
                    </button>

                    <div class="year-side" onclick="changeYear(-1)" id="prev-year"></div>
                    <div id="display-year"></div>
                    <div class="year-side" onclick="changeYear(1)" id="next-year"></div>
                </div>
                
                <div class="months-grid" id="months"></div>
            </div>

            <div id="announcements-panel" class="announcements-overlay">
                <div class="panel-header">
                    <h2>ОБЪЯВЛЕНИЯ</h2>
                    <button class="close-panel-btn" onclick="toggleBoard()" title="Закрыть">✕</button>
                </div>
                <div id="board-content" class="board-items">
                    <div style="text-align:center; opacity:0.3; margin-top:50px; color:var(--color-text-white);">ЗАГРУЗКА...</div>
                </div>
            </div>

            <button class="board-toggle-btn" onclick="toggleBoard()" title="Открыть объявления">
                <span class="board-icon">◀</span>
            </button>
        </div>
    </div>
    
    <div id="image-viewer" class="image-viewer" onclick="closeViewer()">
        <div class="close-viewer">✕</div>
        <img id="viewer-img" src="" alt="View">
    </div>

    <div id="user-display" style="display:none;">...</div>

    <script type="module">
        const user = localStorage.getItem('currentUser');
        if (!user) { window.location.replace('index.html'); }

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBHtxnILGvSyWfrBDkp-ye4yNKACVVdDAE",
            authDomain: "calendarium-1f7d7.firebaseapp.com",
            projectId: "calendarium-1f7d7",
            storageBucket: "calendarium-1f7d7.firebasestorage.app",
            appId: "1:204240857105:web:6ece4e6a4031f61a62a9b0"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        
        const monthsNames = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
        const monthImages = [
            "Led.png", "Led.png", "Zar.png", "Zar.png", 
            "Zar.png", "Cer.png", "Cer.png", "Cer.png", 
            "Bre.png", "Bre.png", "Bre.png", "Led.png"
        ];
        let currentYear = parseInt(localStorage.getItem('selectedYear')) || new Date().getFullYear();

        document.getElementById('user-display').innerText = user;
        if(user.toLowerCase() === 'admin') {
            document.getElementById('admin-btn').style.display = 'flex';
            document.getElementById('board-edit-btn').style.display = 'flex';
        }

        window.toggleCalendarView = () => {
            const grid = document.getElementById('months');
            const mainView = document.getElementById('main-view');
            
            grid.classList.toggle('linear-mode');
            
            if (grid.classList.contains('linear-mode')) {
                mainView.classList.add('linear-active');
                localStorage.setItem('calendarViewMode', 'linear');
            } else {
                mainView.classList.remove('linear-active');
                localStorage.setItem('calendarViewMode', 'grid');
            }
        };

        function initGrid() {
            const grid = document.getElementById('months');
            const mainView = document.getElementById('main-view');
            const now = new Date();
            const todayMonth = now.getMonth(); 
            const todayYear = now.getFullYear();

            let gridHTML = '';
            monthsNames.forEach((m, i) => {
                const isToday = (i === todayMonth && currentYear === todayYear);
                const statusClass = isToday ? 'current-active' : '';
                const mNum = (i + 1).toString().padStart(2, '0'); 
                
                gridHTML += `
                    <div class="month-card ${statusClass}" 
                         style="--bg-img: url('${monthImages[i]}')" 
                         onclick="goToMonth(${i})">
                        <span class="m-num">${mNum}</span>
                        <span class="m-name">${m}</span>
                        <div class="month-indicator" id="ind-${i}"></div>
                    </div>`;
            });
            grid.innerHTML = gridHTML;

            const savedView = localStorage.getItem('calendarViewMode');
            if (savedView === 'linear') {
                grid.classList.add('linear-mode');
                mainView.classList.add('linear-active');
            }
        }

        window.goToMonth = (i) => {
            localStorage.setItem('selectedMonth', i);
            localStorage.setItem('selectedYear', currentYear);
            window.location.href = 'notes.html';
        };

        window.changeYear = (dir) => { 
            if (!document.startViewTransition) { applyYearChange(dir); return; }
            document.startViewTransition(() => applyYearChange(dir));
        };

        function applyYearChange(dir) { currentYear += dir; updateDisp(); initGrid(); loadData(); }

        function updateDisp() {
            document.getElementById('display-year').innerText = currentYear;
            document.getElementById('prev-year').innerText = currentYear - 1;
            document.getElementById('next-year').innerText = currentYear + 1;
            localStorage.setItem('selectedYear', currentYear);
        }

        window.toggleBoard = async () => {
            const panel = document.getElementById('announcements-panel');
            panel.classList.toggle('active');
            if(panel.classList.contains('active')) { await loadBoardData(); }
        };

        async function loadBoardData() {
            const content = document.getElementById('board-content');
            content.innerHTML = '<div style="text-align:center; opacity:0.3; margin-top:50px; grid-column: 1 / -1; color: var(--color-text-white);">ОБНОВЛЕНИЕ...</div>';
            
            try {
                const snap = await getDoc(doc(db, "board", "main")); 
                if (snap.exists() && snap.data().posts && snap.data().posts.length > 0) {
                    const postsData = snap.data().posts;
                    let html = '';
                    const sortedPosts = [...postsData].sort((a, b) => b.id - a.id);
                    
                    sortedPosts.forEach(post => {
                        const imageHtml = post.imageUrl ? `<img src="${post.imageUrl}" style="width:100%; max-height:200px; object-fit:cover; border-radius:8px; margin-top:auto; cursor: zoom-in; transition: 0.2s;" onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1" alt="Фото" onclick="openViewer('${post.imageUrl}')">` : '';
                        html += `
                            <div class="board-card">
                                <h3 style="font-size: 0.75rem; color: var(--color-text-muted); font-weight: 700; margin: 0 0 8px 0; text-transform: uppercase;">
                                    ${post.date} • ${post.author}
                                </h3>
                                <p style="margin: 0 0 10px 0; color: var(--color-text-white); font-size: 0.95rem; line-height: 1.5; white-space: pre-wrap; word-break: break-word;">
                                    ${post.text}
                                </p>
                                ${imageHtml}
                            </div>
                        `;
                    });
                    content.innerHTML = html;
                } else {
                    content.innerHTML = '<div style="text-align:center; opacity:0.2; margin-top:50px; grid-column: 1 / -1; color: var(--color-text-white);">ОБЪЯВЛЕНИЙ ПОКА НЕТ</div>';
                }
            } catch (e) {
                console.error("Ошибка при загрузке доски:", e);
                content.innerHTML = '<div style="color:var(--color-error); text-align:center; margin-top:50px; grid-column: 1 / -1;">ОШИБКА ЗАГРУЗКИ</div>';
            }
        }

        async function loadData() {
            const container = document.getElementById('next-event-container');
            if (!container) return;
            container.innerHTML = '<div style="font-size:0.6rem; opacity:0.3; text-align:center; margin-top:20px; color: var(--color-text-white);">ПОИСК...</div>';
            
            const now = new Date();
            const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            let upcomingEvents = [];

            for(let i=0; i<12; i++) {
                const ind = document.getElementById(`ind-${i}`);
                if(ind) ind.innerHTML = '';
            }

            const monthPromises = Array.from({length: 12}, (_, i) => getDoc(doc(db, "calendar", `${currentYear}_${i}`)));
            const snapshots = await Promise.all(monthPromises);

            snapshots.forEach((snap, i) => {
                if (snap.exists()) {
                    const data = snap.data();
                    const ind = document.getElementById(`ind-${i}`);
                    
                    // Обновленная логика для разделения memorial и congress
                    let hasRed = false, hasCongress = false, hasBlue = false;

                    Object.entries(data).forEach(([day, notes]) => {
                        if (!Array.isArray(notes)) return;
                        notes.forEach(n => {
                            if (n.category === 'memorial') hasRed = true;
                            else if (n.category === 'congress') hasCongress = true;
                            else hasBlue = true;
                            
                            const eventDate = new Date(currentYear, i, parseInt(day)).getTime();
                            if (eventDate >= todayStart) {
                                upcomingEvents.push({ text: n.text, day: day, mName: monthsNames[i], stamp: eventDate, cat: n.category });
                            }
                        });
                    });

                    if (ind) {
                        if (hasRed) ind.innerHTML += '<div class="dot red"></div>';
                        if (hasCongress) ind.innerHTML += '<div class="dot congress"></div>';
                        if (hasBlue) ind.innerHTML += '<div class="dot blue"></div>';
                    }
                }
            });

            upcomingEvents.sort((a, b) => a.stamp - b.stamp);
            if (upcomingEvents.length > 0) {
                let html = '';
                upcomingEvents.slice(0, 5).forEach(ev => {
                    // Разделяем цвета боковой полоски по категориям
                    let dotColor = 'var(--color-ev-meeting)';
                    if (ev.cat === 'memorial') dotColor = 'var(--color-ev-memorial)';
                    if (ev.cat === 'congress') dotColor = 'var(--color-ev-congress)';

                    html += `<div class="event-card-mini" style="border-left-color: ${dotColor}"><div class="ev-title">${ev.text}</div><div class="ev-date">${ev.day} ${ev.mName}</div></div>`;
                });
                container.innerHTML = html;
            } else {
                container.innerHTML = '<div style="font-size:0.6rem; opacity:0.2; text-align:center; margin-top:20px; color: var(--color-text-white);">СОБЫТИЙ НЕТ</div>';
            }
        }

        window.openViewer = (url) => {
            document.getElementById('viewer-img').src = url;
            document.getElementById('image-viewer').style.display = 'flex';
        };
        window.closeViewer = () => {
            document.getElementById('image-viewer').style.display = 'none';
        };

        updateDisp();
        initGrid();
        loadData();
    </script>
</body>
</html>
