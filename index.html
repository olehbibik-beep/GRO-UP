<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRO-UP Lobby</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-5">
    <div id="auth-modal" class="fixed inset-0 bg-black/50 backdrop-blur-md z-50 flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 text-center shadow-2xl">
        <h2 class="text-2xl font-black mb-2 text-gray-800">Как тебя зовут?</h2>
        <p class="text-gray-500 mb-6">Введи имя, чтобы войти в лобби</p>
        <input id="user-name-input" type="text" placeholder="Твое имя" 
               class="w-full p-5 rounded-2xl bg-gray-100 mb-4 outline-none focus:ring-4 ring-indigo-200 text-center font-bold text-xl">
        <button onclick="saveName()" class="w-full bg-indigo-600 text-white font-bold p-5 rounded-2xl shadow-lg shadow-indigo-200 active:scale-95 transition-all">
            Войти в GRO-UP
        </button>
    </div>
</div>
    <div id="lobby" class="max-w-md mx-auto">
        <h1 class="text-3xl font-black mb-6 text-indigo-600">GRO-UP</h1>
        <div id="categories-list" class="grid grid-cols-1 gap-4">
            <p class="text-gray-500">Загрузка лобби...</p>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
