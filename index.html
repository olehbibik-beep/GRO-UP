<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="icon" href="icon-512.png" type="image/png">
    <link rel="apple-touch-icon" href="icon-512.png">
    <meta name="theme-color" content="#0f172a">
    
    <title>GRO-UP App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ui: {
                            bg: '#cbd5e1', 
                            nav: '#0f172a',      
                            report: '#9333ea',   
                            news: '#0ea5e9',     
                            success: '#10b981',  
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { display: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .custom-scrollbar::-webkit-scrollbar { display: block; width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
    </style>
</head>
<!-- ИСПРАВЛЕНИЕ: Жесткая фиксация экрана (h-[100dvh] flex flex-col-reverse) -->
<body class="bg-ui-bg h-[100dvh] font-sans text-slate-800 overflow-hidden flex flex-col-reverse md:flex-row w-full">

    <!-- МЕНЮ (теперь не прыгает) -->
    <nav class="shrink-0 w-full bg-ui-nav flex flex-row items-center justify-between z-40 pb-safe md:h-[100dvh] md:w-20 md:flex-col md:justify-start md:py-6 md:border-t-0">
        <button onclick="switchTab('home', this)" class="nav-btn group flex flex-col items-center justify-center flex-1 py-3 md:flex-none md:w-full outline-none transition-colors">
            <div class="nav-icon-container bg-slate-700 text-white p-2.5 rounded-full transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 md:w-7 md:h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" /></svg>
            </div>
        </button>
        <button onclick="switchTab('tasks', this)" class="nav-btn group flex flex-col items-center justify-center flex-1 py-3 md:flex-none md:w-full outline-none transition-colors">
            <div class="nav-icon-container text-slate-500 hover:text-slate-300 p-2.5 rounded-full transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 md:w-7 md:h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" /></svg>
            </div>
        </button>
        <button onclick="switchTab('territories', this)" class="nav-btn group flex flex-col items-center justify-center flex-1 py-3 md:flex-none md:w-full outline-none transition-colors">
            <div class="nav-icon-container text-slate-500 hover:text-slate-300 p-2.5 rounded-full transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 md:w-7 md:h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498l4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 00-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0z" /></svg>
            </div>
        </button>
        <button onclick="openProfileModal()" class="nav-btn group flex flex-col items-center justify-center flex-1 py-3 md:flex-none md:w-full outline-none md:mt-auto transition-colors">
            <div class="nav-icon-container text-slate-500 hover:text-slate-300 p-2.5 rounded-full transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 md:w-7 md:h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>
            </div>
        </button>
    </nav>

    <!-- ИСПРАВЛЕНИЕ: Контент прокручивается ВНУТРИ этого блока -->
    <main class="flex-1 overflow-y-auto custom-scrollbar relative w-full pb-6" id="main-dashboard" style="display: none;">
        <div class="w-full max-w-5xl mx-auto pt-4 md:pt-6 px-0 md:pl-8 md:pr-6">
            
            <div id="tab-home" class="tab-content active px-4 md:px-0">
                <div class="flex flex-col gap-4">
                    
                    <div class="flex bg-white rounded-lg border border-slate-200 overflow-hidden shadow-sm min-h-[72px]">
                        <div id="calendar-events" class="w-4/5 flex flex-col justify-center border-r border-slate-200 bg-transparent">
                            <p class="p-4 text-xs text-slate-500 italic text-center">Загрузка встреч...</p>
                        </div>
                        <button onclick="window.location.href='full-calendar.html'" class="w-1/5 shrink-0 bg-slate-50 hover:bg-slate-100 flex flex-col items-center justify-center transition-colors outline-none p-2 group">
                            <span class="text-rose-500 text-2xl mb-1 group-hover:scale-110 transition-transform">📅</span>
                            <span class="text-[7px] font-black uppercase tracking-widest text-slate-500 text-center leading-tight">Весь<br>год</span>
                        </button>
                    </div>

                    <div class="w-full relative group">
                        <button onclick="scrollNews(-240)" class="hidden md:flex absolute -left-4 top-1/2 -translate-y-1/2 z-10 bg-white/90 hover:bg-white text-slate-700 border border-slate-200 rounded-lg w-8 h-10 items-center justify-center outline-none opacity-80 hover:opacity-100 transition-opacity">
                            <svg class="w-5 h-5 pr-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                        </button>

                        <div id="content-news" class="flex flex-nowrap overflow-x-auto gap-3 pb-2 snap-x snap-mandatory custom-scrollbar items-stretch scroll-smooth w-full">
                            <p class="italic text-slate-500 w-full text-center py-4 text-sm">Загрузка ленты...</p>
                        </div>

                        <button onclick="scrollNews(240)" class="hidden md:flex absolute -right-4 top-1/2 -translate-y-1/2 z-10 bg-white/90 hover:bg-white text-slate-700 border border-slate-200 rounded-lg w-8 h-10 items-center justify-center outline-none opacity-80 hover:opacity-100 transition-opacity">
                            <svg class="w-5 h-5 pl-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
                        </button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="bg-white p-4 md:p-5 rounded-lg border border-slate-200 flex flex-col">
                            <div class="flex items-center justify-between mb-4">
                                <h3 class="text-base md:text-xl font-black text-slate-800 flex items-center gap-2">
                                    <span class="text-ui-report text-xl leading-none">📝</span> Мой отчет
                                </h3>
                            </div>
                            <fieldset id="report-fieldset" disabled class="flex-grow flex flex-col gap-2 transition-opacity duration-200 opacity-50 grayscale-[50%]">
                                <div class="flex items-center justify-between">
                                    <label class="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border border-slate-200 cursor-pointer">
                                        <input type="checkbox" id="rep-participated" class="w-4 h-4 md:w-5 md:h-5 accent-ui-report rounded cursor-pointer shrink-0">
                                        <span class="font-bold text-slate-700 text-xs md:text-sm leading-none mt-0.5">Служил(а)</span>
                                    </label>
                                    <span class="text-[8px] font-black text-ui-report uppercase bg-slate-100 px-2 py-0.5 rounded border border-slate-200" id="current-month-label">Месяц</span>
                                </div>
                                <div class="flex gap-2 mt-2">
                                    <div class="w-full">
                                        <label class="text-[8px] uppercase font-bold text-slate-400 block mb-1 text-center tracking-widest leading-tight">Часы<br>&nbsp;</label>
                                        <input type="number" id="rep-hours" class="w-full p-2 rounded-lg text-center font-black text-base md:text-xl text-slate-800 outline-none border border-slate-200 focus:border-ui-report bg-slate-50">
                                    </div>
                                    <div class="w-full">
                                        <label class="text-[8px] uppercase font-bold text-slate-400 block mb-1 text-center tracking-widest leading-tight">Изучения<br>Библии</label>
                                        <input type="number" id="rep-studies" class="w-full p-2 rounded-lg text-center font-bold text-base md:text-xl text-slate-800 outline-none border border-slate-200 focus:border-ui-report bg-slate-50">
                                    </div>
                                    <div class="w-full">
                                        <label class="text-[8px] uppercase font-bold text-slate-400 block mb-1 text-center tracking-widest leading-tight">Кредит<br>&nbsp;</label>
                                        <input type="number" id="rep-credit" class="w-full p-2 rounded-lg text-center font-bold text-base md:text-xl text-slate-800 outline-none border border-slate-200 focus:border-ui-report bg-slate-50">
                                    </div>
                                </div>
                                <p id="last-report-log" class="text-[8px] text-slate-400 text-center font-medium mt-1 min-h-[12px]"></p>
                            </fieldset>
                            <div class="mt-3 flex gap-2 w-full h-12">
                                <button onclick="submitReport()" id="submit-report-btn" class="w-4/5 bg-slate-800 hover:bg-slate-900 text-white font-bold rounded-lg transition-colors duration-200 text-sm active:bg-slate-700 outline-none flex items-center justify-center">✏️ Заполнить</button>
                                <button onclick="openReportHistory()" class="w-1/5 bg-purple-50 hover:bg-purple-100 text-purple-600 font-bold rounded-lg transition-colors duration-200 text-lg outline-none flex items-center justify-center border border-purple-200" title="Архив отчетов">👁️</button>
                            </div>
                        </div>

                        <div class="bg-white p-4 md:p-5 rounded-lg border border-slate-200 flex flex-col">
                            <h3 class="text-base md:text-xl font-black text-slate-800 flex items-center gap-2 mb-2">
                                <span class="text-amber-500 text-xl leading-none">🧹</span> На этой неделе
                            </h3>
                            <div id="dashboard-duties" class="flex-grow flex flex-col justify-center">
                                <p class="text-xs text-slate-400 italic text-center">Загрузка...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tab-tasks" class="tab-content px-4 md:px-0">
                <div class="bg-white p-5 rounded-lg border border-slate-200">
                    <h3 class="font-black text-slate-800 flex items-center gap-2 mb-6 text-xl"><span class="text-sky-500">📚</span> Активные задания</h3>
                    <div id="upcoming-tasks-list" class="space-y-3 mb-8"><p class="text-slate-400 text-sm italic">Нет активных заданий</p></div>
                    <h3 class="font-bold text-slate-400 text-xs uppercase tracking-widest mb-4 border-t border-slate-100 pt-4">Архив</h3>
                    <div id="past-tasks-list" class="space-y-3"><p class="text-slate-400 text-sm italic">История пуста</p></div>
                </div>
            </div>

            <div id="tab-territories" class="tab-content px-4 md:px-0">
                <div class="bg-white p-5 rounded-lg border border-slate-200">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-black text-slate-800 flex items-center gap-2 text-xl"><span class="text-emerald-500">🗺️</span> Мои участки</h3>
                        <button onclick="requestTerritory(this)" class="bg-slate-100 border border-slate-200 text-slate-700 font-bold py-2 px-4 rounded-lg text-xs hover:bg-slate-200 outline-none transition-colors">Попросить</button>
                    </div>
                    <div id="territories-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"><p class="text-slate-400 text-sm italic">У вас пока нет участков</p></div>
                </div>
            </div>
        </div>
    </main>

    <div id="global-loader" class="fixed inset-0 bg-ui-bg z-[200] flex flex-col items-center justify-center transition-opacity duration-500">
        <img src="icon-512.png" alt="GRO-UP" class="w-24 h-24 mb-8 rounded-2xl drop-shadow-sm object-contain">
        <div class="animate-spin rounded-full h-10 w-10 border-4 border-slate-300 border-t-slate-800 mb-4"></div>
        <p class="text-[10px] font-bold text-slate-400 tracking-widest uppercase animate-pulse">Загрузка данных...</p>
    </div>

    <!-- КОМПАКТНАЯ МОДАЛКА: ПРОФИЛЬ -->
    <div id="profile-modal" class="fixed inset-0 bg-slate-900/80 z-[70] hidden items-center justify-center p-4">
        <div class="bg-white w-full max-w-xs md:max-w-sm rounded-lg p-6 text-center relative border border-slate-200">
            <button onclick="closeModals()" class="absolute top-4 right-5 text-slate-300 hover:text-slate-600 text-2xl font-black outline-none transition-colors">✖</button>
            <button id="push-btn" onclick="setupNotifications()" style="display: none;" class="absolute top-4 left-5 bg-indigo-50 border border-indigo-100 text-indigo-600 w-10 h-10 flex items-center justify-center rounded-lg hover:bg-indigo-100 transition-colors text-xl z-50 outline-none">🔔</button>

            <div class="w-16 h-16 bg-slate-100 text-slate-400 rounded-full mx-auto flex items-center justify-center text-2xl mb-3 border border-slate-200">👤</div>
            
            <p id="profile-congregation" class="text-[9px] font-bold text-indigo-500 uppercase tracking-widest mb-1">Загрузка...</p>
            <h2 id="profile-name" class="text-xl font-black text-slate-800 mb-2">Имя</h2>
            
            <div id="profile-roles-container" class="flex flex-wrap justify-center gap-1 mb-4"></div>
            
            <div class="bg-slate-50 rounded-lg border border-slate-200 p-3 mb-5 text-left text-xs">
                <div class="flex justify-between border-b border-slate-200 pb-1.5 mb-1.5">
                    <span class="font-bold text-slate-400 uppercase text-[10px]">Группа</span>
                    <span id="profile-group" class="font-black text-slate-700">№ -</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="font-bold text-slate-400 uppercase text-[10px]">Ответственный</span>
                    <span id="profile-overseer" class="font-bold text-indigo-500">...</span>
                </div>
            </div>

            <div id="profile-admin-links" class="hidden grid-cols-3 gap-3 mb-5">
                <a href="admin.html" id="profile-admin-btn" class="hidden flex-col items-center justify-center bg-slate-50 border border-slate-200 text-slate-500 hover:bg-slate-100 hover:text-slate-800 p-3.5 rounded-lg transition-colors" title="Админ-панель">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                </a>
                <a href="calendar.html" id="profile-calendar-btn" class="hidden flex-col items-center justify-center bg-slate-50 border border-slate-200 text-slate-500 hover:bg-rose-50 hover:text-rose-600 p-3.5 rounded-lg transition-colors" title="Добавить событие">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                </a>
                <a href="duties.html" id="profile-duties-btn" class="hidden flex-col items-center justify-center bg-slate-50 border border-slate-200 text-slate-500 hover:bg-amber-50 hover:text-amber-600 p-3.5 rounded-lg transition-colors" title="График дежурств">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg>
                </a>
                <a href="reports.html" id="profile-reports-btn" class="hidden flex-col items-center justify-center bg-slate-50 border border-slate-200 text-slate-500 hover:bg-purple-50 hover:text-purple-600 p-3.5 rounded-lg transition-colors" title="Отчеты группы">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
                </a>
                <a href="territories.html" id="profile-terr-btn" class="hidden flex-col items-center justify-center bg-slate-50 border border-slate-200 text-slate-500 hover:bg-emerald-50 hover:text-emerald-600 p-3.5 rounded-lg transition-colors" title="Управление участками">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" /></svg>
                </a>
                <a href="school.html" id="profile-school-btn" class="hidden flex-col items-center justify-center bg-slate-50 border border-slate-200 text-slate-500 hover:bg-sky-50 hover:text-sky-600 p-3.5 rounded-lg transition-colors" title="Управление школой">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 14l9-5-9-5-9 5 9 5z" /><path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" /><path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222" /></svg>
                </a>
            </div>
            
            <button onclick="logout()" class="w-full bg-red-50 text-red-500 font-bold p-3 rounded-lg border border-red-200 text-sm transition-colors hover:bg-red-100 outline-none">Выйти из аккаунта</button>
        </div>
    </div>

    <div id="report-history-modal" class="fixed inset-0 bg-slate-900/80 z-[70] hidden items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-lg p-6 text-center border border-slate-200 relative max-h-[80vh] flex flex-col">
            <button onclick="closeModals()" class="absolute top-4 right-5 text-slate-300 hover:text-slate-600 text-2xl font-black outline-none transition-colors">✖</button>
            <h2 class="text-xl font-black text-slate-800 mb-6 flex items-center justify-center gap-2"><span class="text-purple-500">📊</span> Мой архив</h2>
            <div id="report-history-list" class="overflow-y-auto flex-grow space-y-3 pr-2 custom-scrollbar pb-2">
                <p class="text-slate-400 text-sm italic">Загрузка...</p>
            </div>
        </div>
    </div>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/GRO-UP/sw.js')
            .then(reg => console.log('Успех:', reg))
            .catch(err => console.log('Ошибка:', err));
        });
      }
    </script>
    <script type="module" src="app.js?v=170"></script>
    <div id="toast-container" class="fixed top-4 left-1/2 -translate-x-1/2 w-11/12 max-w-sm z-[100] flex flex-col gap-2 pointer-events-none"></div>
</body>
</html>
