<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GRO-UP App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Скрываем скроллбары для красоты */
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-slate-800 pb-20 font-sans">

    <div id="auth-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-8 text-center shadow-2xl">
            <h2 class="text-2xl font-black mb-2 text-slate-800">Добро пожаловать</h2>
            <p class="text-slate-500 mb-6 text-sm">Введи имя для входа в систему</p>
            <input id="user-name-input" type="text" placeholder="Твое имя" 
                   class="w-full p-4 rounded-xl bg-slate-100 mb-4 outline-none focus:ring-2 ring-sky-500 text-center font-bold text-xl transition-all">
            <button id="login-btn" class="w-full bg-sky-600 hover:bg-sky-700 text-white font-bold p-4 rounded-xl shadow-lg shadow-sky-600/30 active:scale-95 transition-all">
                Войти
            </button>
        </div>
    </div>

    <header class="bg-sky-600 text-white p-4 flex justify-between items-center sticky top-0 z-30 shadow-md">
        <div>
            <h1 class="text-xl font-bold">Собрание</h1>
            <p class="text-xs text-sky-200">GRO-UP Dashboard</p>
        </div>
        <a href="admin.html" class="admin-controls hidden p-2 bg-sky-500 rounded-full hover:bg-sky-400 transition">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M10.343 3.94c.09-.542.56-.94 1.11-.94h1.093c.55 0 1.02.398 1.11.94l.149.894c.07.424.384.764.78.93.398.164.855.142 1.205-.108l.737-.527a1.125 1.125 0 011.45.12l.773.774c.39.389.44 1.002.12 1.45l-.527.737c-.25.35-.272.806-.107 1.204.165.397.505.71.93.78l.893.15c.543.09.94.56.94 1.109v1.094c0 .55-.397 1.02-.94 1.11l-.893.149c-.425.07-.765.383-.93.78-.165.398-.143.854.107 1.204l.527.738c.32.447.269 1.06-.12 1.45l-.774.773a1.125 1.125 0 01-1.449.12l-.738-.527c-.35-.25-.806-.272-1.203-.107-.397.165-.71.505-.78.929l-.15.894c-.09.542-.56.94-1.11.94h-1.094c-.55 0-1.019-.398-1.11-.94l-.148-.894c-.071-.424-.384-.764-.781-.93-.398-.164-.854-.142-1.204.108l-.738.527c-.447.32-1.06.269-1.45-.12l-.773-.774a1.125 1.125 0 01-.12-1.45l.527-.737c.25-.35.273-.806.108-1.204-.165-.397-.505-.71-.93-.78l-.894-.15c-.542-.09-.94-.56-.94-1.109v-1.094c0-.55.398-1.02.94-1.11l.894-.149c.424-.07.765-.383.93-.78.165-.398.143-.854-.107-1.204l-.527-.738a1.125 1.125 0 01.12-1.45l.773-.773a1.125 1.125 0 011.45-.12l.737.527c.35.25.807.272 1.204.107.397-.165.71-.505.78-.929l.15-.894z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
        </a>
    </header>

    <main class="p-4 max-w-md mx-auto space-y-4">
        
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-purple-50/80 rounded-2xl p-4 border border-purple-100 shadow-sm flex flex-col justify-between">
                <div>
                    <h2 class="font-bold text-lg text-purple-900 mb-1">Отчет</h2>
                    <p class="text-xs text-purple-600 mb-2">Апрель</p>
                    <div class="flex justify-between items-end mb-4">
                        <div class="text-center"><div class="text-xs text-purple-500">Часы</div><div class="font-black text-2xl text-purple-800">3</div></div>
                        <div class="text-center"><div class="text-xs text-purple-500">Кр</div><div class="font-bold text-lg text-purple-800">-</div></div>
                        <div class="text-center"><div class="text-xs text-purple-500">BS</div><div class="font-bold text-lg text-purple-800">1</div></div>
                    </div>
                </div>
                <button class="w-full bg-purple-200/50 border border-purple-300 text-purple-800 rounded-xl py-2 text-sm font-bold flex items-center justify-center gap-2 active:scale-95 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>
                    Отправлено
                </button>
            </div>

            <div class="bg-amber-50/80 rounded-2xl p-4 border border-amber-100 shadow-sm relative flex flex-col">
                <div class="absolute top-4 right-4 bg-yellow-300 text-yellow-900 font-black px-2 py-0.5 rounded-lg text-xs shadow-sm">1</div>
                <h2 class="font-bold text-lg text-amber-900 mb-4">Предстоящее</h2>
                <div class="flex items-start gap-2 mt-auto">
                    <span class="text-emerald-500 text-lg">✨</span>
                    <div>
                        <p class="font-bold text-sm text-amber-900 leading-tight">Уборка зала</p>
                        <p class="text-xs text-amber-700 mt-1">4.-10. мая</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-rose-50/80 rounded-2xl p-4 border border-rose-100 shadow-sm">
            <div class="flex justify-between items-center mb-3 border-b border-rose-200/50 pb-2">
                <h2 class="font-bold text-lg text-rose-900">Доска объявлений</h2>
                <button onclick="window.openAddModal('news')" class="admin-controls hidden bg-rose-200 text-rose-800 rounded-full w-8 h-8 font-black flex items-center justify-center active:scale-90">+</button>
            </div>
            <div id="content-news" class="space-y-3 text-sm text-rose-800">Загрузка...</div>
        </div>

        <div class="bg-orange-50/80 rounded-2xl p-4 border border-orange-100 shadow-sm">
            <div class="flex justify-between items-center mb-3 border-b border-orange-200/50 pb-2">
                <h2 class="font-bold text-lg text-orange-900">События</h2>
                <button onclick="window.openAddModal('important')" class="admin-controls hidden bg-orange-200 text-orange-800 rounded-full w-8 h-8 font-black flex items-center justify-center active:scale-90">+</button>
            </div>
            <div id="content-important" class="space-y-3 text-sm text-orange-800">Загрузка...</div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around items-center h-16 z-40 shadow-[0_-5px_15px_rgba(0,0,0,0.03)]">
        <button class="flex flex-col items-center justify-center w-full h-full text-sky-600">
            <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" class="w-6 h-6"><path d="M11.47 3.84a.75.75 0 011.06 0l8.99 8.99a.75.75 0 11-1.06 1.06l-1.46-1.46v7.82a.75.75 0 01-.75.75h-4.5a.75.75 0 01-.75-.75v-3a.75.75 0 00-.75-.75h-2.5a.75.75 0 00-.75.75v3a.75.75 0 01-.75.75h-4.5a.75.75 0 01-.75-.75v-7.82l-1.46 1.46a.75.75 0 11-1.06-1.06l8.99-8.99z" /></svg>
        </button>
        <button class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-sky-600 transition">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" /></svg>
        </button>
        <button id="profile-btn" class="flex flex-col items-center justify-center w-full h-full text-gray-400 hover:text-sky-600 transition">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>
        </button>
    </nav>

    <div id="profile-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] hidden items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-8 text-center shadow-2xl relative">
            <button onclick="window.closeModals()" class="absolute top-4 right-5 text-slate-400 hover:text-slate-800 text-xl font-bold">✖</button>
            <div class="w-20 h-20 bg-sky-100 text-sky-600 rounded-full mx-auto flex items-center justify-center text-3xl mb-4 shadow-inner">👤</div>
            <h2 id="profile-name" class="text-2xl font-black text-slate-800 mb-1">Имя</h2>
            <span id="profile-role" class="inline-block px-3 py-1 bg-slate-100 text-slate-500 rounded-lg text-xs font-bold uppercase tracking-wider mb-8">Роль</span>
            <button onclick="window.logout()" class="w-full bg-red-50 hover:bg-red-500 text-red-600 hover:text-white font-bold p-4 rounded-xl transition-all border border-red-100 active:scale-95">Выйти из аккаунта</button>
        </div>
    </div>

    <div id="add-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] hidden items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl relative">
            <button onclick="window.closeModals()" class="absolute top-4 right-5 text-slate-400 hover:text-slate-800 text-xl font-bold">✖</button>
            <h2 class="text-2xl font-black text-slate-800 mb-4">Новая запись</h2>
            <textarea id="add-content-text" rows="4" placeholder="Введите текст..." class="w-full p-4 rounded-xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 ring-sky-500 resize-none mb-4"></textarea>
            <button onclick="window.saveNewContent()" class="w-full bg-sky-600 hover:bg-sky-700 text-white font-bold p-4 rounded-xl shadow-lg active:scale-95 transition-all">Опубликовать</button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
