<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRO-UP Lobby</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-5">
    <div id="auth-modal" class="fixed inset-0 bg-black/50 backdrop-blur-md z-50 flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 text-center shadow-2xl">
        <h2 class="text-2xl font-black mb-2 text-gray-800">Как тебя зовут?</h2>
        <p class="text-gray-500 mb-6">Введи имя, чтобы войти в лобби</p>
        <input id="user-name-input" type="text" placeholder="Твое имя" 
               class="w-full p-5 rounded-2xl bg-gray-100 mb-4 outline-none focus:ring-4 ring-indigo-200 text-center font-bold text-xl">
        <button onclick="saveName()" class="w-full bg-indigo-600 text-white font-bold p-5 rounded-2xl shadow-lg shadow-indigo-200 active:scale-95 transition-all">
            Войти в GRO-UP
        </button>
    </div>
</div>
    <div id="lobby" class="max-w-md mx-auto">
        <h1 class="text-3xl font-black mb-6 text-indigo-600">GRO-UP</h1>
        <div id="categories-list" class="grid grid-cols-1 gap-4">
            <p class="text-gray-500">Загрузка лобби...</p>
        </div>
    </div>
<div class="max-w-4xl mx-auto mt-10">
    <h2 class="text-2xl font-black mb-6 text-gray-800">Информационные панели</h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="info-sections">
        
        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-indigo-600">Новости</h3>
                <button onclick="addContent('news')" class="admin-controls hidden w-8 h-8 bg-indigo-100 text-indigo-600 rounded-full hover:bg-indigo-200 font-bold">+</button>
            </div>
            <div id="content-news" class="text-gray-600 text-sm space-y-3">Загрузка...</div>
        </div>

        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-orange-600">Важное</h3>
                <button onclick="addContent('important')" class="admin-controls hidden w-8 h-8 bg-orange-100 text-orange-600 rounded-full hover:bg-orange-200 font-bold">+</button>
            </div>
            <div id="content-important" class="text-gray-600 text-sm space-y-3">Загрузка...</div>
        </div>

        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-emerald-600">Задания</h3>
                <button onclick="addContent('tasks')" class="admin-controls hidden w-8 h-8 bg-emerald-100 text-emerald-600 rounded-full hover:bg-emerald-200 font-bold">+</button>
            </div>
            <div id="content-tasks" class="text-gray-600 text-sm space-y-3">Загрузка...</div>
        </div>

    </div>
</div>
    <script type="module" src="main.js"></script>
</body>
</html>
