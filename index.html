<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRO-UP Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-slate-800">

    <div id="pending-screen" class="fixed inset-0 bg-white z-[100] hidden flex-col items-center justify-center text-center p-6">
        <span class="text-5xl mb-6 animate-pulse">⏳</span>
        <h2 class="text-3xl font-black text-slate-800 mb-2">Заявка на рассмотрении</h2>
        <p class="text-slate-500 mb-8 max-w-sm">Администратор скоро проверит ваши данные и выдаст доступ к панели управления.</p>
        <button onclick="logout()" class="text-indigo-500 font-bold hover:underline bg-indigo-50 px-6 py-3 rounded-xl">Выйти из аккаунта</button>
    </div>

    <nav class="fixed left-0 top-0 h-screen w-20 bg-white border-r border-slate-200 flex flex-col items-center py-6 z-40">
        <a href="#" class="mb-8 p-3 bg-indigo-600 text-white rounded-2xl shadow-md">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-7 h-7"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" /></svg>
        </a>
        
        <div class="flex flex-col gap-4 w-full px-3">
            <button onclick="openProfileModal()" class="p-3 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all flex justify-center" title="Мой профиль">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>
            </button>
            
            <a href="reports.html" class="overseer-controls hidden p-3 text-slate-400 hover:text-purple-500 hover:bg-purple-50 rounded-xl transition-all flex justify-center" title="Отчеты собрания">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z" /></svg>
            </a>

            <a href="admin.html" class="admin-controls hidden p-3 text-slate-400 hover:text-orange-500 hover:bg-orange-50 rounded-xl transition-all flex justify-center" title="Админ-панель">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M10.343 3.94c.09-.542.56-.94 1.11-.94h1.093c.55 0 1.02.398 1.11.94l.149.894c.07.424.384.764.78.93.398.164.855.142 1.205-.108l.737-.527a1.125 1.125 0 011.45.12l.773.774c.39.389.44 1.002.12 1.45l-.527.737c-.25.35-.272.806-.107 1.204.165.397.505.71.93.78l.893.15c.543.09.94.56.94 1.109v1.094c0 .55-.397 1.02-.94 1.11l-.893.149c-.425.07-.765.383-.93.78-.165.398-.143.854.107 1.204l.527.738c.32.447.269 1.06-.12 1.45l-.774.773a1.125 1.125 0 01-1.449.12l-.738-.527c-.35-.25-.806-.272-1.203-.107-.397.165-.71.505-.78.929l-.15.894c-.09.542-.56.94-1.11.94h-1.094c-.55 0-1.019-.398-1.11-.94l-.148-.894c-.071-.424-.384-.764-.781-.93-.398-.164-.854-.142-1.204.108l-.738.527c-.447.32-1.06.269-1.45-.12l-.773-.774a1.125 1.125 0 01-.12-1.45l.527-.737c.25-.35.273-.806.108-1.204-.165-.397-.505-.71-.93-.78l-.894-.15c-.542-.09-.94-.56-.94-1.109v-1.094c0-.55.398-1.02.94-1.11l.894-.149c.424-.07.765-.383.93-.78.165-.398.143-.854-.107-1.204l-.527-.738a1.125 1.125 0 01.12-1.45l.773-.773a1.125 1.125 0 011.45-.12l.737.527c.35.25.807.272 1.204.107.397-.165.71-.505.78-.929l.15-.894z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
            </a>
        </div>
    </nav>

    <main class="pl-24 pr-6 py-8 w-full max-w-6xl mx-auto hidden" id="main-dashboard">
        <header class="mb-8">
            <h1 class="text-3xl font-black text-slate-800">Рабочий стол</h1>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="bg-purple-50/80 p-6 rounded-3xl shadow-sm border border-purple-100 flex flex-col h-[350px]">
                <div class="flex items-center gap-2 mb-4 border-b border-purple-100 pb-3">
                    <span class="text-2xl">📝</span><h3 class="text-xl font-bold text-purple-900">Мой отчет</h3>
                </div>
                <div class="flex-grow flex flex-col justify-center gap-3">
                    <p class="text-xs text-purple-600 font-bold uppercase text-center mb-2" id="current-month-label">Месяц</p>
                    <div class="flex gap-2">
                        <div class="w-full text-center">
                            <label class="text-[10px] uppercase font-bold text-purple-500 block mb-1">Часы</label>
                            <input type="number" id="rep-hours" class="w-full p-3 rounded-xl text-center font-black text-xl text-purple-900 outline-none border border-purple-200 focus:border-purple-500 bg-white">
                        </div>
                        <div class="w-full text-center">
                            <label class="text-[10px] uppercase font-bold text-purple-500 block mb-1">Кр</label>
                            <input type="number" id="rep-pubs" class="w-full p-3 rounded-xl text-center font-bold text-lg text-purple-900 outline-none border border-purple-200 focus:border-purple-500 bg-white">
                        </div>
                        <div class="w-full text-center">
                            <label class="text-[10px] uppercase font-bold text-purple-500 block mb-1">BS</label>
                            <input type="number" id="rep-studies" class="w-full p-3 rounded-xl text-center font-bold text-lg text-purple-900 outline-none border border-purple-200 focus:border-purple-500 bg-white">
                        </div>
                    </div>
                </div>
                <button onclick="submitReport()" id="submit-report-btn" class="mt-4 w-full bg-purple-200/50 hover:bg-purple-500 text-purple-800 hover:text-white font-bold py-3 rounded-2xl transition-colors border border-purple-300 active:scale-95">Отправить</button>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-sky-100 flex flex-col h-[350px]">
                <div class="flex items-center gap-2 mb-4 border-b border-sky-50 pb-3">
                    <span class="text-2xl">📚</span><h3 class="text-xl font-bold text-sky-900">Мои задания</h3>
                </div>
                <div id="my-tasks-list" class="space-y-3 overflow-y-auto pr-2 flex-grow text-sm text-slate-600">Загрузка...</div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-emerald-100 flex flex-col h-[350px]">
                <div class="flex items-center gap-2 mb-4 border-b border-emerald-50 pb-3">
                    <span class="text-2xl">🗺️</span><h3 class="text-xl font-bold text-emerald-900">Мои участки</h3>
                </div>
                <div id="my-territories-list" class="space-y-3 overflow-y-auto pr-2 flex-grow text-sm text-slate-600">Загрузка...</div>
                <button onclick="requestTerritory()" class="mt-4 w-full bg-emerald-50 hover:bg-emerald-500 text-emerald-600 hover:text-white font-bold py-3 rounded-2xl transition-colors active:scale-95 border border-emerald-200">Попросить участок</button>
            </div>
        </div>

        <div class="mt-8 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
            <div class="flex justify-between items-center mb-4 border-b border-slate-50 pb-2">
                <h3 class="text-xl font-bold text-slate-800 flex items-center gap-2"><span>📢</span> Доска объявлений</h3>
                <button onclick="openAddModal('news')" class="admin-controls hidden px-4 py-1.5 bg-slate-100 hover:bg-indigo-100 text-indigo-600 font-bold rounded-xl text-sm transition-colors">+ Запись</button>
            </div>
            <div id="content-news" class="space-y-3 text-sm text-slate-600">Загрузка...</div>
        </div>
    </main>

    <div id="profile-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 text-center shadow-2xl relative">
            <button onclick="closeModals()" class="absolute top-4 right-5 text-slate-400 hover:text-slate-800 text-xl font-bold">✖</button>
            <div class="w-20 h-20 bg-indigo-100 text-indigo-600 rounded-full mx-auto flex items-center justify-center text-3xl mb-4 shadow-inner">👤</div>
            <h2 id="profile-name" class="text-2xl font-black text-slate-800 mb-1">Имя</h2>
            <span id="profile-role" class="inline-block px-3 py-1 bg-slate-100 text-slate-500 rounded-lg text-xs font-bold uppercase tracking-wider mb-8">Роль</span>
            <button onclick="logout()" class="w-full bg-red-50 hover:bg-red-500 text-red-600 hover:text-white font-bold p-4 rounded-2xl transition-all border border-red-100 hover:border-red-500 active:scale-95">Выйти из аккаунта</button>
        </div>
    </div>

    <div id="add-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden items-center justify-center p-6">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl relative">
            <button onclick="closeModals()" class="absolute top-4 right-5 text-slate-400 font-bold">✖</button>
            <h2 class="text-2xl font-black mb-4">Добавить запись</h2>
            <textarea id="add-content-text" rows="5" class="w-full p-4 rounded-2xl bg-slate-50 border outline-none mb-4"></textarea>
            <button onclick="saveNewContent()" class="w-full bg-indigo-600 text-white font-bold p-4 rounded-2xl">Опубликовать</button>
        </div>
    </div>

    <script type="module" src="main.js?v=5"></script>
</body>
</html>
