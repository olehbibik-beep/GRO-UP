<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Администратора</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ui: {
                            bg: '#f8fafc',       
                            nav: '#0f172a',      
                            active: '#6366f1',   
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-ui-bg text-slate-800 min-h-screen font-sans">

    <header class="bg-white shadow-sm sticky top-0 z-40 border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black text-slate-800 tracking-tight">Центр Управления</h1>
                <p class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Панель администратора</p>
            </div>
            <div class="flex gap-2 text-xs font-bold">
                <a href="index.html" class="text-slate-500 hover:text-slate-800 bg-slate-100 hover:bg-slate-200 px-4 py-2 rounded-lg transition-colors border border-slate-200">← На главную</a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6">
        
        <section class="mb-8">
            <h2 class="text-sm font-bold flex items-center gap-2 mb-3 uppercase tracking-widest text-slate-500">
                <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                Заявки на регистрацию (<span id="pending-count">0</span>)
            </h2>
            <div class="bg-white rounded-xl shadow-sm border border-amber-100 overflow-hidden">
                <div id="pending-list" class="divide-y divide-slate-50">
                    <p class="text-slate-400 text-xs text-center py-4">Нет новых заявок</p>
                </div>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-end mb-3">
                <h2 class="text-sm font-bold uppercase tracking-widest text-slate-500">Пользователи (<span id="active-count">0</span>)</h2>
                <input type="text" id="search-user" placeholder="Поиск по имени..." class="p-1.5 px-3 border border-slate-200 rounded-lg outline-none focus:border-indigo-500 w-64 text-xs font-medium bg-white shadow-sm">
            </div>
            
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[700px]">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200 text-[10px] text-slate-400 uppercase tracking-widest">
                                <th class="py-2 px-4 font-bold w-1/3">Имя</th>
                                <th class="py-2 px-4 font-bold text-center w-20">Группа</th>
                                <th class="py-2 px-4 font-bold w-1/2">Права и Роли</th>
                                <th class="py-2 px-4 font-bold text-right w-24">Настройки</th>
                            </tr>
                        </thead>
                        <tbody id="active-list" class="divide-y divide-slate-100 text-xs font-medium">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <div id="edit-user-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden items-center justify-center p-4 transition-opacity">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl relative border border-slate-100 overflow-hidden">
            <div class="bg-slate-50 px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <span id="modal-user-icon" class="text-3xl drop-shadow-sm">👨‍💼</span>
                    <div>
                        <h2 id="modal-user-name" class="text-lg font-black text-slate-800 leading-none">Имя Пользователя</h2>
                        <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Профиль</span>
                    </div>
                </div>
                <button onclick="closeEditModal()" class="text-slate-400 hover:text-red-500 text-xl font-black outline-none transition-colors">✖</button>
            </div>

            <div class="p-6">
                <div class="mb-5">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Номер Группы (для отчетов)</label>
                    <input type="number" id="modal-user-group" placeholder="Например: 5" class="w-full p-2.5 rounded-lg bg-slate-50 border border-slate-200 outline-none focus:border-indigo-500 focus:bg-white text-sm font-bold text-slate-700 transition-colors">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Назначить роли</label>
                    <div class="grid grid-cols-2 gap-2" id="modal-roles-grid">
                        <label class="flex items-center gap-2 p-2 rounded-lg border border-slate-200 bg-slate-50 cursor-pointer hover:bg-slate-100 transition-colors">
                            <input type="checkbox" value="Возвещатель" class="role-cb w-3.5 h-3.5 accent-indigo-600 rounded">
                            <span class="text-xs font-bold text-slate-700">Возвещатель</span>
                        </label>
                        <label class="flex items-center gap-2 p-2 rounded-lg border border-purple-200 bg-purple-50 cursor-pointer hover:bg-purple-100 transition-colors">
                            <input type="checkbox" value="Надзиратель группы" class="role-cb w-3.5 h-3.5 accent-purple-600 rounded">
                            <span class="text-xs font-bold text-purple-900">Надзиратель гр.</span>
                        </label>
                        
                        <label class="flex items-center gap-2 p-2 rounded-lg border border-emerald-200 bg-emerald-50 cursor-pointer hover:bg-emerald-100 transition-colors">
                            <input type="checkbox" value="Ответственный за участки" class="role-cb w-3.5 h-3.5 accent-emerald-600 rounded">
                            <span class="text-[10px] font-bold text-emerald-900 leading-tight">Ответственный<br>за участки</span>
                        </label>
                        <label class="flex items-center gap-2 p-2 rounded-lg border border-sky-200 bg-sky-50 cursor-pointer hover:bg-sky-100 transition-colors">
                            <input type="checkbox" value="Ответственный за школу" class="role-cb w-3.5 h-3.5 accent-sky-600 rounded">
                            <span class="text-[10px] font-bold text-sky-900 leading-tight">Ответственный<br>за школу</span>
                        </label>

                        <label class="flex items-center gap-2 p-2 rounded-lg border border-rose-200 bg-rose-50 cursor-pointer hover:bg-rose-100 transition-colors col-span-2">
                            <input type="checkbox" value="Админ" class="role-cb w-3.5 h-3.5 accent-rose-600 rounded">
                            <span class="text-xs font-bold text-rose-900">Администратор (Полный доступ)</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="bg-slate-50 px-6 py-4 border-t border-slate-100 flex justify-end gap-3">
                <button onclick="closeEditModal()" class="px-4 py-2 text-xs font-bold text-slate-500 hover:bg-slate-200 rounded-lg transition-colors">Отмена</button>
                <button onclick="saveUserEdit()" id="modal-save-btn" class="px-6 py-2 text-xs font-bold bg-slate-800 text-white hover:bg-slate-900 rounded-lg shadow-md transition-colors">Сохранить</button>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js?v=40"></script>
</body>
</html>
