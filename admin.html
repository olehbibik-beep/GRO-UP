<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Администратора</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">

    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-indigo-600">Центр Управления</h1>
                <p class="text-sm text-slate-500">Управление заявками и ролями</p>
            </div>
            <div class="flex gap-3">
                <a href="calendar.html" class="bg-rose-100 text-rose-700 hover:bg-rose-500 hover:text-white font-bold px-4 py-2 rounded-xl transition-colors flex items-center gap-2">
                    <span>📅</span> Календарь
                </a>
                
                <a href="territories.html" class="bg-emerald-100 text-emerald-700 hover:bg-emerald-500 hover:text-white font-bold px-4 py-2 rounded-xl transition-colors flex items-center gap-2">
                    <span>🗺️</span> Участки
                </a>
                <a href="school.html" class="bg-sky-100 text-sky-700 hover:bg-sky-500 hover:text-white font-bold px-4 py-2 rounded-xl transition-colors flex items-center gap-2">
                    <span>📚</span> Школа
                </a>
                <a href="duties.html" class="bg-amber-100 text-amber-700 hover:bg-amber-500 hover:text-white font-bold px-4 py-2 rounded-xl transition-colors flex items-center gap-2">
                    <span>🗓️</span> График
                </a>
                <a href="index.html" class="text-slate-500 hover:text-indigo-600 font-bold bg-slate-50 px-4 py-2 rounded-xl border border-slate-200 transition-colors">На сайт</a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <section class="mb-12">
            <h2 class="text-xl font-bold flex items-center gap-2 mb-4">
                <span class="w-3 h-3 rounded-full bg-amber-500 animate-pulse"></span>
                Новые заявки (<span id="pending-count">0</span>)
            </h2>
            <div class="bg-white rounded-2xl shadow-sm border border-amber-100 overflow-hidden">
                <div id="pending-list" class="divide-y divide-slate-100 p-4">
                    <p class="text-slate-400 text-sm text-center py-4">Загрузка...</p>
                </div>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-end mb-4">
                <h2 class="text-xl font-bold">Активные пользователи (<span id="active-count">0</span>)</h2>
                <input type="text" id="search-user" placeholder="Поиск по имени..." class="p-2 px-4 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 w-64 text-sm">
            </div>
            
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[1000px]">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-sm text-slate-500 uppercase">
                            <th class="p-4 font-bold w-1/4">Пользователь</th>
                            <th class="p-4 font-bold text-center w-24">Группа</th>
                            <th class="p-4 font-bold w-1/3">Роли (можно несколько)</th>
                            <th class="p-4 font-bold text-center text-sky-600">Школа</th>
                            <th class="p-4 font-bold text-right">Действия</th>
                        </tr>
                    </thead>
                    <tbody id="active-list" class="divide-y divide-slate-100 text-sm">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module" src="admin.js?v=4"></script>
</body>
</html>
