<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GRO-UP Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-10 min-h-screen">
    <h1 class="text-3xl font-black mb-8 text-indigo-400">Управление пользователями</h1>
    
    <div class="bg-slate-800 rounded-3xl overflow-hidden shadow-2xl border border-slate-700">
        <div class="grid grid-cols-4 gap-4 p-6 bg-slate-900/50 border-b border-slate-700 text-sm font-bold text-slate-400 uppercase tracking-wider">
            <div>Пользователь</div>
            <div>Статус / Комната</div>
            <div>Категория (Права)</div>
            <div>Действия</div>
        </div>
        
        <div id="users-list" class="divide-y divide-slate-700/50">
            <p class="p-6 text-slate-500">Загрузка...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ТВОЙ КОНФИГ FIREBASE СЮДА
        const firebaseConfig = { /* ... */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ТВОИ КАТЕГОРИИ. Первые две (индексы 0 и 1) - имеют ПОЛНЫЙ ДОСТУП.
        const ROLES = ["Владелец", "Админ", "Модератор", "Участник", "Гость"];

        onSnapshot(collection(db, "users"), (snapshot) => {
            const container = document.getElementById('users-list');
            container.innerHTML = '';

            snapshot.forEach(uDoc => {
                const user = uDoc.data();
                const id = uDoc.id;

                // Генерация выпадающего списка (select) для ролей
                let rolesOptions = ROLES.map(r => 
                    `<option value="${r}" ${user.role === r ? 'selected' : ''}>${r}</option>`
                ).join('');

                container.innerHTML += `
                    <div class="grid grid-cols-4 gap-4 p-6 items-center hover:bg-slate-700/30 transition-colors">
                        <div>
                            <h3 class="text-lg font-bold text-white">${user.name}</h3>
                            <p class="text-xs text-slate-500">${id}</p>
                        </div>

                        <div>
                            ${user.isBlocked ? 
                                '<span class="px-3 py-1 bg-red-500/20 text-red-400 rounded-full text-xs font-bold">Заблокирован</span>' : 
                                '<span class="px-3 py-1 bg-emerald-500/20 text-emerald-400 rounded-full text-xs font-bold">Активен</span>'
                            }
                        </div>

                        <div>
                            <select onchange="changeUserRole('${id}', this.value)" 
                                    class="bg-slate-900 border border-slate-600 text-white text-sm rounded-xl px-3 py-2 outline-none focus:border-indigo-500 w-full cursor-pointer">
                                ${rolesOptions}
                            </select>
                        </div>

                        <div class="flex gap-2">
                            <button onclick="toggleBlock('${id}', ${user.isBlocked})" class="bg-slate-700 hover:bg-orange-500 px-4 py-2 rounded-xl text-sm font-bold transition">
                                ${user.isBlocked ? 'Разбан' : 'Бан'}
                            </button>
                            <button onclick="deleteUser('${id}')" class="bg-red-900/50 hover:bg-red-600 text-red-200 hover:text-white px-4 py-2 rounded-xl text-sm font-bold transition">
                                Удалить
                            </button>
                        </div>
                    </div>
                `;
            });
        });

        window.changeUserRole = (id, newRole) => {
            updateDoc(doc(db, "users", id), { role: newRole });
        };

        window.toggleBlock = (id, currentStatus) => {
            updateDoc(doc(db, "users", id), { isBlocked: !currentStatus });
        };

        window.deleteUser = (id) => {
            if(confirm('Точно удалить пользователя?')) deleteDoc(doc(db, "users", id));
        };
    </script>
</body>
</html>
