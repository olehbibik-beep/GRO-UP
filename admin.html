<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GRO-UP Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-5">
    <h1 class="text-3xl font-bold mb-8 text-indigo-400">Управление пользователями</h1>
    
    <div id="users-list" class="grid gap-4">
        </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { /* ТВОЙ КОНФИГ */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        onSnapshot(collection(db, "users"), (snapshot) => {
            const container = document.getElementById('users-list');
            container.innerHTML = '';

            snapshot.forEach(uDoc => {
                const user = uDoc.data();
                const id = uDoc.id;

                container.innerHTML += `
                    <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 flex flex-wrap items-center justify-between">
                        <div>
                            <h3 class="text-xl font-bold">${user.name}</h3>
                            <p class="text-sm text-slate-400">ID: ${id}</p>
                            <div class="flex gap-2 mt-2">
                                <span class="px-2 py-1 bg-indigo-500/20 text-indigo-300 rounded-lg text-xs">${user.role}</span>
                                ${user.isBlocked ? '<span class="px-2 py-1 bg-red-500/20 text-red-400 rounded-lg text-xs">Заблокирован</span>' : ''}
                            </div>
                        </div>

                        <div class="flex gap-3">
                            <button onclick="toggleBlock('${id}', ${user.isBlocked})" class="bg-orange-500 hover:bg-orange-600 px-4 py-2 rounded-xl text-sm font-bold transition">
                                ${user.isBlocked ? 'Разблокировать' : 'Забанить'}
                            </button>
                            <button onclick="makeAdmin('${id}')" class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-xl text-sm font-bold transition">
                                Сделать админом
                            </button>
                            <button onclick="deleteUser('${id}')" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-xl text-sm font-bold transition">
                                Удалить
                            </button>
                        </div>
                    </div>
                `;
            });
        });

        window.toggleBlock = (id, currentStatus) => {
            updateDoc(doc(db, "users", id), { isBlocked: !currentStatus });
        };

        window.makeAdmin = (id) => {
            updateDoc(doc(db, "users", id), { role: 'admin' });
        };

        window.deleteUser = (id) => {
            if(confirm('Точно удалить?')) deleteDoc(doc(db, "users", id));
        };
    </script>
</body>
</html>
