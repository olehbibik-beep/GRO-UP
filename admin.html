<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Администратора</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { ui: { bg: '#f8fafc' } } } } }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-ui-bg text-slate-800 min-h-screen font-sans">

    <header class="bg-white shadow-sm sticky top-0 z-40 border-b border-slate-200">
        <div class="max-w-[1400px] mx-auto px-4 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-indigo-600">Центр Управления</h1>
                <p class="text-xs text-slate-500 font-bold uppercase tracking-widest mt-0.5">Админка (Автосохранение)</p>
            </div>
            <div class="flex gap-3 text-sm">
                <a href="calendar.html" class="bg-rose-50 text-rose-700 hover:bg-rose-500 hover:text-white font-bold px-4 py-2 rounded-xl transition-colors flex items-center gap-2"><span>📅</span> Календарь</a>
                <a href="territories.html" class="bg-emerald-50 text-emerald-700 hover:bg-emerald-500 hover:text-white font-bold px-4 py-2 rounded-xl transition-colors flex items-center gap-2"><span>🗺️</span> Участки</a>
                <a href="school.html" class="bg-sky-50 text-sky-700 hover:bg-sky-500 hover:text-white font-bold px-4 py-2 rounded-xl transition-colors flex items-center gap-2"><span>📚</span> Школа</a>
                <a href="index.html" class="text-slate-500 hover:text-indigo-600 font-bold bg-slate-50 px-4 py-2 rounded-xl border border-slate-200 transition-colors">На сайт</a>
            </div>
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto px-4 py-6">
        
        <section class="mb-8">
            <h2 class="text-sm font-bold flex items-center gap-2 mb-3 uppercase tracking-widest text-slate-500">
                <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span>
                Заявки на регистрацию (<span id="pending-count">0</span>)
            </h2>
            <div class="bg-white rounded-xl shadow-sm border border-amber-100 overflow-hidden">
                <div id="pending-list" class="divide-y divide-slate-50">
                    <p class="text-slate-400 text-xs text-center py-4">Нет новых заявок</p>
                </div>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-end mb-3">
                <h2 class="text-sm font-bold uppercase tracking-widest text-slate-500">Все пользователи (<span id="active-count">0</span>)</h2>
                <input type="text" id="search-user" placeholder="Поиск по имени..." class="p-2 px-4 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 w-72 text-sm font-medium bg-white shadow-sm">
            </div>
            
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[1000px]">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200 text-[9px] text-slate-400 uppercase tracking-widest">
                                <th class="py-3 px-4 font-bold w-1/5">Имя и Пол</th>
                                <th class="py-3 px-2 font-bold text-center w-16">Группа</th>
                                <th class="py-3 px-2 font-bold text-center text-sky-600 w-24">Школа</th>
                                <th class="py-3 px-4 font-bold w-1/4">Доступ на сайте</th>
                                <th class="py-3 px-4 font-bold w-1/3">Ответственный за</th>
                                <th class="py-3 px-4 font-bold text-right w-24">Настройки</th>
                            </tr>
                        </thead>
                        <tbody id="active-list" class="divide-y divide-slate-100 text-sm font-medium">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="admin.js?v=52"></script>
</body>
</html>
